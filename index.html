*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;font-size:var(--font);line-height:1.68}.app{width:100vw;height:100vh;display:grid;grid-template-columns:360px minmax(0,1fr);overflow:hidden}aside{height:100vh;overflow-y:auto;padding:22px 18px;background:linear-gradient(180deg,#fffaf2,#eee2d2);border-right:1px solid var(--line)}main{height:100vh;overflow-y:auto;padding:34px 44px 90px;scroll-behavior:smooth}.brand,.card,.hero{background:rgba(255,250,242,.96);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.brand{padding:18px;margin-bottom:18px;position:sticky;top:0;z-index:5}.course{font-size:.78rem;font-weight:900;letter-spacing:.08em;color:var(--muted);text-transform:uppercase}h1{font-size:clamp(2.1rem,4.7vw,4.5rem);line-height:1.02;letter-spacing:-.05em;margin:8px 0 14px}h2{font-size:clamp(1.55rem,2.7vw,2.65rem);line-height:1.12;letter-spacing:-.035em;margin:0 0 18px}h3{font-size:1.28rem;color:var(--accent2);margin:22px 0 10px}p{margin:0 0 15px}.subtitle{font-size:1.08rem;color:var(--muted);max-width:1000px}.small{font-size:.86rem;color:var(--muted)}.lang-row,.tool-row,.row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}button{border:0;border-radius:999px;padding:10px 14px;font-weight:900;cursor:pointer;background:var(--soft);color:var(--ink);font-size:.92rem}button.active,.primary{background:var(--accent2);color:#fff}button:hover{filter:brightness(.97);box-shadow:0 8px 18px rgba(0,0,0,.08)}.nav{display:grid;gap:8px;margin:14px 0}.nav button{width:100%;text-align:left;border-radius:16px;background:rgba(255,255,255,.78);border:1px solid var(--line);white-space:normal;line-height:1.35;display:flex;gap:10px;align-items:flex-start}.nav button.active{background:var(--accent);border-color:var(--accent);color:#fff}.navnum{display:inline-grid;place-items:center;width:28px;height:28px;min-width:28px;border-radius:999px;background:var(--soft);color:var(--accent2)}.nav button.active .navnum{background:rgba(255,255,255,.22);color:#fff}.progress-wrap{margin:18px 0}.progress-label{display:flex;justify-content:space-between;font-size:.82rem;color:var(--muted);margin-bottom:7px}.progress-track{height:10px;background:#dfd2c0;border-radius:999px;overflow:hidden}.progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent2),var(--gold));transition:.25s}.section{display:none;max-width:1220px;margin:0 auto}.section.active{display:block;animation:fade .16s ease}@keyframes fade{from{opacity:.55;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}.hero{padding:30px;margin-bottom:20px;background:linear-gradient(135deg,#fffaf2,#f2e4d3)}.card{padding:26px;margin-bottom:20px;background:rgba(255,255,255,.84)}.grid{display:grid;gap:18px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}.pill{display:inline-flex;padding:6px 11px;border-radius:999px;background:var(--soft);color:var(--accent2);font-size:.78rem;font-weight:900;letter-spacing:.04em;text-transform:uppercase;margin:0 6px 8px 0}.pedagogy-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:0 0 18px}.pedagogy-strip span{background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px;text-align:center;font-size:.82rem;font-weight:900;color:var(--accent2)}.module-question,.guide{background:#eef6f2;border-left:5px solid var(--accent2);padding:14px 16px;border-radius:16px;font-weight:800;margin:12px 0}.formation-note{background:#fff7e8;border-left:5px solid var(--gold);padding:14px 16px;border-radius:16px}.question-card{background:#fffdf8;border:1px solid var(--line);border-radius:18px;padding:16px;margin:12px 0}.scaffold{font-weight:900;line-height:1.9;background:#f8f3eb;border-left:6px solid var(--accent);padding:14px 18px;border-radius:18px}.table-scroll{overflow:auto}table{width:100%;border-collapse:collapse;margin:16px 0;background:#fff;border-radius:16px;overflow:hidden}th,td{border:1px solid var(--line);padding:12px;vertical-align:top}th{background:var(--soft);text-align:left}textarea,input{width:100%;border:1px solid var(--line);border-radius:18px;padding:14px;font:inherit;background:#fffdf8;resize:vertical}textarea{min-height:120px}.mcq-option{display:block;width:100%;margin:8px 0;padding:12px 14px;border-radius:16px;border:1px solid var(--line);background:#fff;text-align:left;cursor:pointer}.mcq-option.correct{border-color:#2f5d50;background:#e9f2ee}.mcq-option.wrong{border-color:#9d3b31;background:#f8e8e5}.toast{position:fixed;right:22px;bottom:22px;background:var(--accent2);color:#fff;padding:12px 16px;border-radius:999px;box-shadow:var(--shadow);opacity:0;transform:translateY(8px);transition:.2s;z-index:99}.toast.show{opacity:1;transform:translateY(0)}@media(max-width:960px){html,body{height:auto;overflow:auto}.app{display:block;height:auto;min-height:100vh;overflow:auto}aside{height:auto;max-height:none;border-right:0;border-bottom:1px solid var(--line)}main{height:auto;overflow:visible;padding:22px 18px 70px}.grid.two,.grid.three{grid-template-columns:1fr}.pedagogy-strip{grid-template-columns:1fr 1fr}}@media print{aside,.tool-row,.lang-row,.toast{display:none!important}html,body,.app,main{height:auto;overflow:visible}.app{display:block}main{padding:0}.section{display:block!important;max-width:none}.card,.hero{box-shadow:none;break-inside:avoid}}

<script>
const DATA = {"meta": {"week": "Week13", "course": "Biblical Hermeneutics", "code": "GEK20070-01", "topic": "The Psalms: Israel's Prayers and Ours", "shortTopic": "Psalms", "school": "Handong Global University · Department of Biblical Studies", "sources": "Gordon D. Fee & Douglas Stuart, Chapter 11 · Grant R. Osborne, Chapter 8", "en": {"course": "GEK20070-01 · Week 13 · Biblical Hermeneutics", "title": "The Psalms: Israel's Prayers and Ours", "subtitle": "Entering Israel's inspired vocabulary for lament, praise, trust, anger, and covenantal address", "orientationTitle": "Student Orientation: Why Psalms Matter This Week", "orientation": "This week trains students to stop treating the Psalms as isolated devotional sayings or propositional doctrines and to enter them as Israel's inspired vocabulary for speaking to God and about God. The Psalms are prayers and hymns, not primarily commands or abstract propositions. Students learn to read poetic form, lament structure, parallelism, imprecatory speech, and canonical movement as formation practices that authorize honest covenantal address before God.", "claimTitle": "Weekly Hermeneutical Claim", "claim": "The Psalms function formationally because they give covenant communities authorized language for joy, grief, rage, trust, confession, and praise. They do not bypass suffering or force premature resolution. They train readers to bring their whole history into God's presence through poetic, structured, embodied address.", "where": "A covenantal worship field: temple, exile, silence, road, memory, and community become spaces where the worshiper speaks honestly before God.", "who": "The reader moves from propositional extractor to covenantal worshiper: one who can inhabit lament, trust, praise, and unresolved complaint without performing false spiritual resolution.", "what": "The Psalms form embodied covenantal participation: honest release, communal memory, non-retaliatory anger, praise, lament, and worship that reshapes identity before God."}, "ko": {"course": "GEK20070-01 · 13주차 · 성경해석학", "title": "시편: 이스라엘의 기도와 우리의 기도", "subtitle": "탄식, 찬양, 신뢰, 분노, 언약적 호소를 위한 이스라엘의 영감 받은 언어 안으로 들어가기", "orientationTitle": "학생 오리엔테이션: 이번 주 시편이 왜 중요한가", "orientation": "이번 주는 학생들이 시편을 고립된 경건 문구나 명제적 교리로 다루는 습관을 멈추고, 하나님께 말하고 하나님에 대해 말하는 이스라엘의 영감 받은 언어 안으로 들어가도록 훈련한다. 시편은 주로 명령이나 추상 명제가 아니라 기도와 찬송이다. 학생들은 시의 형식, 탄식 구조, 평행법, 저주 시편, 정경적 움직임을 하나님 앞에서 정직한 언약적 호소를 가능하게 하는 형성 실천으로 읽는 법을 배운다.", "claimTitle": "이번 주 해석학 주장", "claim": "시편은 언약 공동체에게 기쁨, 슬픔, 분노, 신뢰, 고백, 찬양을 위한 공인된 언어를 제공하기 때문에 형성적으로 기능한다. 시편은 고난을 우회하거나 성급한 해결을 강요하지 않는다. 그것은 독자가 자신의 모든 역사를 시적이고 구조화되고 몸으로 구현되는 말하기를 통해 하나님의 임재 안으로 가져가도록 훈련한다.", "where": "언약적 예배의 장이다. 성전, 포로, 침묵, 길, 기억, 공동체가 예배자가 하나님 앞에서 정직하게 말하는 공간이 된다.", "who": "독자는 명제를 추출하는 사람에서 언약적 예배자로 이동한다. 그는 거짓 영적 해결을 연기하지 않고 탄식, 신뢰, 찬양, 해결되지 않은 불평을 정직하게 머물 수 있는 사람이다.", "what": "시편은 몸으로 구현되는 언약적 참여를 형성한다. 정직한 release, 공동 기억, 보복하지 않는 분노, 찬양, 탄식, 예배가 하나님 앞에서 정체성을 다시 빚는다."}}, "scholars": [{"name": "Gordon D. Fee & Douglas Stuart", "en": "Primary guide for the Psalms as prayers and musical poems. They warn against overexegesis, propositional extraction, and verse isolation, and emphasize psalm type, whole-psalm integrity, lament structure, and honest worship.", "ko": "시편을 기도와 음악적 시로 읽도록 돕는 1차 안내자이다. 과잉주해, 명제 추출, 절 단위 고립 읽기를 경계하고, 시편 유형, 전체 시편의 통일성, 탄식 구조, 정직한 예배를 강조한다."}, {"name": "Grant R. Osborne", "en": "Secondary guide for poetry as functional covenant speech. He emphasizes canonical macrostructure, dynamic parallelism, strophic structure, metaphor, historical background, genre, and the hermeneutical spiral.", "ko": "시를 기능적 언약 언어로 읽게 하는 2차 안내자이다. 정경적 거시구조, 역동적 평행법, 연 구조, 은유, 역사 배경, 장르, 해석학적 나선을 강조한다."}, {"name": "Gerald Wilson", "en": "Conversation partner for the five-book canonical shape of the Psalter, tracing a movement from Davidic conflict through national crisis, exile, reorientation, pilgrimage, and final Hallel.", "ko": "시편의 다섯 권 정경 구조를 읽는 대화 파트너이다. 다윗의 갈등에서 국가적 위기, 포로, 재정향, 순례, 최종 할렐로 이어지는 움직임을 추적한다."}, {"name": "Walter Brueggemann", "en": "Conversation partner for the Psalms as practices of orientation, disorientation, and new orientation, especially for lament and prophetic challenge to false peace.", "ko": "시편을 orientation, disorientation, new orientation의 실천으로 읽는 대화 파트너이다. 특히 탄식과 거짓 평화를 도전하는 예언자적 기능을 강조한다."}], "glossary": [{"term": "Musical Poems", "en": "Stuart's description of the Psalms as poetry addressed to the mind through the heart, not as technical doctrinal exposition.", "ko": "Stuart가 시편을 설명하는 표현이다. 시편은 마음을 통해 지성에 말하는 시이지 기술적 교리 설명이 아니다."}, {"term": "Lament", "en": "The largest psalm category; honest covenantal appeal to God through address, complaint, trust, plea, assurance, and praise. Psalm 88 shows that lament may remain unresolved.", "ko": "가장 큰 시편 유형이다. 부름, 불평, 신뢰, 간구, 확신, 찬양을 통해 하나님께 정직하게 호소한다. 시편 88편은 탄식이 해결 없이 남을 수 있음을 보여 준다."}, {"term": "Imprecatory Psalms", "en": "Psalms that verbalize covenantal anger and release vengeance into God's field rather than enacting it physically against others.", "ko": "언약적 분노를 말로 표현하고, 보복을 타인에게 직접 실행하지 않고 하나님의 장으로 release하는 시편이다."}, {"term": "Parallelism", "en": "The dominant structure of Hebrew poetry; the second line usually adds movement, intensification, contrast, or yield rather than merely repeating the first.", "ko": "히브리 시의 지배적 구조이다. 둘째 줄은 보통 첫째 줄을 단순 반복하지 않고 움직임, 강화, 대조, 새로운 결실을 더한다."}, {"term": "n−1 Release", "en": "The psalmic act of releasing honest speech, grief, anger, or vengeance into God's keeping rather than retaining control of it.", "ko": "정직한 말, 슬픔, 분노, 보복 욕망을 내가 붙들지 않고 하나님의 보존과 판단 안으로 release하는 시편적 행위이다."}, {"term": "יֵרָאֶה / yērāʾeh", "en": "Disclosure: let it appear. Meaning surfaces beneath the waters through covenant fidelity, not through the worshiper's technique.", "ko": "드러남, 곧 '나타나게 하라'는 의미이다. 의미는 예배자의 기술이 아니라 언약적 신실함 안에서 물 아래에서 표면으로 드러난다."}, {"term": "Stage 1", "en": "Cyclical imprisonment or dark lament with no resolution, canonically legitimized by Psalm 88.", "ko": "해결 없는 어두운 탄식 또는 순환적 갇힘의 단계이다. 시편 88편이 이를 정경적으로 정당화한다."}, {"term": "Stage 2", "en": "KAIROS rupture or lament with pivot, exemplified by Psalm 22 where abandonment moves toward disclosure and communal witness.", "ko": "KAIROS 균열 또는 전환점을 지닌 탄식이다. 시편 22편에서 버림받음이 드러남과 공동체 증언으로 이동한다."}, {"term": "Stage 3", "en": "Cruciform spiral and trust after rupture, cultivated through memory, praise, and embodied pilgrimage.", "ko": "균열 이후의 십자가형 나선과 신뢰이다. 기억, 찬양, 몸으로 걷는 순례를 통해 형성된다."}, {"term": "How Meaning Moves", "en": "Student-facing scaffold: TEXT → tension/problem → movement/change → identity/community reshaping → embodied participation.", "ko": "학생용 통합 스캐폴드이다. 본문 → 긴장/문제 → 움직임/변화 → 정체성/공동체 재형성 → embodied participation."}], "modules": [{"id": "m1", "en": {"title": "M1 — Reframing the Psalms: From Propositions to Address", "ask": "Why are the Psalms difficult even though they feel familiar?", "student": "The Psalms are difficult not because they are obscure but because they are familiar. Familiarity often makes readers treat every line as a direct proposition, command, or promise. But the Psalms are words spoken to God or about God. They are prayers and hymns. Their authority is formational: they give covenant communities authorized language for joy, grief, rage, trust, confession, and praise.", "body": ["The basic hermeneutical shift is direction of address. In Proverbs or Epistles, the reader often receives direct instruction. In the Psalms, the reader overhears inspired words addressed upward to God or outward about God within worship.", "Therefore the first question is not, What doctrine can I extract? The first question is, What kind of speech is this, and how does it move within the covenant relationship?", "The Psalms do not tell us merely what to believe about suffering. They give us language to enter suffering before God honestly, without sinning and without performing contentment we do not feel."], "check": ["Why is it a category error to read every psalm line as direct propositional output?", "How can words spoken to God become a word from God to us?"], "guide": "The Psalms form us by authorizing covenantal speech. They teach not merely ideas about God, but how to address God truthfully from within joy, grief, anger, trust, and unresolved pain."}, "ko": {"title": "M1 — 시편 재정향: 명제에서 호소로", "ask": "시편은 왜 익숙한데도 해석하기 어려운가?", "student": "시편은 난해해서 어려운 것이 아니라 익숙하기 때문에 어렵다. 익숙함은 독자가 모든 줄을 직접적인 명제, 명령, 약속처럼 다루게 만든다. 그러나 시편은 하나님께 말하거나 하나님에 대해 말하는 말씀이다. 시편은 기도와 찬송이다. 그 권위는 형성적이다. 시편은 언약 공동체에게 기쁨, 슬픔, 분노, 신뢰, 고백, 찬양을 위한 공인된 언어를 준다.", "body": ["기본 해석학 전환은 말의 방향이다. 잠언이나 서신서에서 독자는 종종 직접적인 가르침을 받는다. 그러나 시편에서 독자는 예배 안에서 하나님께 위로 향하거나 하나님에 대해 바깥으로 향하는 영감 받은 말을 듣는다.", "그러므로 첫 질문은 '어떤 교리를 추출할 수 있는가?'가 아니다. 첫 질문은 '이것은 어떤 종류의 말이며, 언약 관계 안에서 어떻게 움직이는가?'이다.", "시편은 고난에 대해 무엇을 믿어야 하는지만 말하지 않는다. 시편은 우리가 죄를 짓지 않고, 느끼지 않는 만족을 연기하지 않고, 하나님 앞에서 고난 안으로 정직하게 들어갈 언어를 준다."], "check": ["시편의 모든 줄을 직접 명제처럼 읽는 것은 왜 범주 오류인가?", "하나님께 드린 말이 어떻게 우리에게 주시는 하나님의 말씀이 될 수 있는가?"], "guide": "시편은 언약적 말하기를 허락함으로써 우리를 형성한다. 시편은 하나님에 대한 생각만이 아니라 기쁨, 슬픔, 분노, 신뢰, 해결되지 않은 고통 속에서 하나님께 진실하게 말하는 법을 가르친다."}}, {"id": "m2", "en": {"title": "M2 — Musical Poetry and the Discipline Against Overexegesis", "ask": "How should readers handle metaphor, hyperbole, and poetic language?", "student": "Fee and Stuart describe the Psalms as musical poems. Hebrew poetry addresses the mind through the heart. Its language is emotive, metaphorical, and structurally patterned, not technically precise doctrinal exposition. Readers must avoid overexegesis and must read each psalm as a complete literary unit.", "body": ["Psalm 51:5 is a key example. The psalmist says he was sinful from conception, but this is hyperbolic confession, not a technical doctrine of conception. The poet intensifies personal sin-history through image and exaggeration.", "Likewise, God as a mighty fortress releases a relational image of security; it is not a structural description to dissect as if it were a doctrinal manual.", "The whole psalm controls the parts. Psalm 22 cannot be understood from verse 1 alone because the movement from abandonment to disclosure and communal witness is the interpretive event."], "check": ["What is overexegesis in poetry?", "Why must Psalm 22 be read as a whole movement rather than as one isolated cry?"], "guide": "Poetry requires form-sensitive precision. Images point and move; they should not be frozen into technical propositions."}, "ko": {"title": "M2 — 음악적 시와 과잉주해를 막는 훈련", "ask": "은유, 과장, 시적 언어를 어떻게 다루어야 하는가?", "student": "Fee와 Stuart는 시편을 음악적 시라고 설명한다. 히브리 시는 마음을 통해 지성에 말한다. 그 언어는 감정적이고 은유적이며 구조화되어 있지, 기술적으로 정밀한 교리 설명이 아니다. 독자는 과잉주해를 피하고 각 시편을 완전한 문학 단위로 읽어야 한다.", "body": ["시편 51:5가 핵심 예이다. 시인은 자신이 잉태 때부터 죄 가운데 있었다고 말하지만, 이것은 잉태에 대한 기술적 교리가 아니라 과장된 고백이다. 시인은 이미지와 과장을 통해 자신의 죄의 역사를 강하게 표현한다.", "마찬가지로 하나님이 견고한 요새라는 표현은 안전에 대한 관계적 이미지를 release한다. 그것은 교리 교재처럼 분해해야 할 구조 설명이 아니다.", "전체 시편이 부분을 통제한다. 시편 22편은 1절만으로 이해할 수 없다. 버림받음에서 드러남과 공동체 증언으로 이동하는 전체 움직임이 해석 사건이기 때문이다."], "check": ["시에서 과잉주해란 무엇인가?", "시편 22편은 왜 고립된 한 외침이 아니라 전체 움직임으로 읽어야 하는가?"], "guide": "시는 형식에 민감한 정확성을 요구한다. 이미지는 가리키고 움직인다. 이미지를 기술 명제로 얼려서는 안 된다."}}, {"id": "m3", "en": {"title": "M3 — Psalm Types, Lament, and Thanksgiving", "ask": "Why does genre determine the movement of a psalm?", "student": "Each psalm type has its own formation function. Lament gives shape to honest suffering; thanksgiving retells distress from the other side of deliverance; hymns of praise, salvation-history psalms, songs of trust, royal psalms, wisdom psalms, and imprecatory psalms each train different covenantal postures.", "body": ["Stuart gives six elements of lament: Address, Complaint, Trust, Deliverance, Assurance, and Praise. These are not a forced recovery chart. They are the authorized shape of honest speech before God.", "Psalm 88 is crucial because it does not reach assurance or praise. It ends in darkness, and its place in Scripture canonizes unresolved Stage 1 voice.", "Thanksgiving psalms retell lament from the other side: Introduction, Distress, Appeal, Deliverance, and Testimony. One person's threshold crossing becomes a community formation resource."], "check": ["What are the six elements of lament?", "Why is Psalm 88 not a failed psalm?"], "guide": "Genre tells us what the psalm is doing. Lament requires honesty, not forced resolution. Thanksgiving gives communal testimony after disclosure."}, "ko": {"title": "M3 — 시편 유형, 탄식, 감사", "ask": "왜 장르가 시편의 움직임을 결정하는가?", "student": "각 시편 유형은 고유한 형성 기능을 가진다. 탄식은 정직한 고난에 형식을 주고, 감사시는 구원 이후의 자리에서 고난을 다시 말한다. 찬양시, 구원사 시편, 신뢰의 노래, 왕권 시편, 지혜 시편, 저주 시편은 각각 다른 언약적 자세를 훈련한다.", "body": ["Stuart는 탄식의 여섯 요소를 제시한다. 부름, 불평, 신뢰, 구원 요청, 확신, 찬양이다. 이것들은 강제된 회복 차트가 아니다. 하나님 앞에서 정직하게 말하는 공인된 형식이다.", "시편 88편은 매우 중요하다. 이 시는 확신이나 찬양에 도달하지 않는다. 어둠으로 끝나며, 성경 안에 위치함으로써 해결되지 않은 Stage 1 목소리를 정경적으로 인정한다.", "감사시는 구원 이후의 자리에서 탄식을 다시 말한다. 서론, 고난, 호소, 구원, 증언의 구조를 가진다. 한 사람의 문턱 넘기가 공동체의 형성 자원이 된다."], "check": ["탄식의 여섯 요소는 무엇인가?", "시편 88편은 왜 실패한 시편이 아닌가?"], "guide": "장르는 시편이 무엇을 하고 있는지 말해 준다. 탄식은 강제 해결이 아니라 정직함을 요구한다. 감사시는 드러남 이후의 공동체 증언을 제공한다."}}, {"id": "m4", "en": {"title": "M4 — Imprecatory Psalms and Non-Retaliatory Release", "ask": "How can covenantal anger be prayed without becoming violence?", "student": "Imprecatory psalms verbalize anger before God. Stuart emphasizes that they harness anger and channel it through God rather than allowing physical retaliation. Osborne emphasizes their covenant-legal ground in the curses of Deuteronomy. Together, they show anger released into God's keeping rather than retained by the victim or weaponized by the community.", "body": ["The Hebrew śānēʾ can carry the sense of being unwilling or unable to put up with something. In this register, hatred is a covenantal refusal to perform acceptance of injustice, not ordinary personal malice.", "Psalm 137 must be taught with care. It is an exile song from a foreclosed worship space where captors demand songs from the wounded community.", "The interpretive task is not to domesticate the rage but to ask what structural arrangement has sealed the victim's voice, stolen worship space, or benefited from suffering."], "check": ["What is the difference between praying anger before God and acting vengeance against a neighbor?", "Why must Psalm 137 be located in exile before contemporary interpretation?"], "guide": "Imprecatory prayer is n−1 release: rage and vengeance are placed before God rather than enacted by the worshiper."}, "ko": {"title": "M4 — 저주 시편과 보복하지 않는 release", "ask": "언약적 분노는 어떻게 폭력이 되지 않고 기도가 될 수 있는가?", "student": "저주 시편은 하나님 앞에서 분노를 말로 표현한다. Stuart는 그것이 분노를 붙잡아 하나님을 통과하게 함으로써 물리적 보복을 막는다고 설명한다. Osborne은 신명기의 언약 저주라는 법적 근거를 강조한다. 둘을 함께 읽으면 분노가 피해자나 공동체 안에 무기로 남는 것이 아니라 하나님의 보존 안으로 release되는 것을 볼 수 있다.", "body": ["히브리어 śānēʾ는 어떤 것을 더 이상 참거나 받아들일 수 없다는 의미를 가질 수 있다. 이 register에서 hate는 일반적 개인 악의가 아니라 불의를 받아들이는 연기를 거부하는 언약적 거절이다.", "시편 137편은 조심스럽게 가르쳐야 한다. 그것은 포로지라는 막힌 예배 공간에서 상처 입은 공동체에게 포로 지배자들이 노래를 요구하는 상황의 노래이다.", "해석 과제는 그 분노를 길들이는 것이 아니다. 어떤 구조가 피해자의 목소리를 봉쇄했는지, 예배 공간을 빼앗았는지, 고난으로부터 이익을 얻었는지 묻는 것이다."], "check": ["하나님 앞에서 분노를 기도하는 것과 이웃에게 보복을 실행하는 것은 어떻게 다른가?", "시편 137편은 왜 현대 적용 전에 반드시 포로 상황 안에 위치해야 하는가?"], "guide": "저주 기도는 n−1 release이다. 분노와 보복 욕망은 예배자가 직접 실행하지 않고 하나님 앞에 놓인다."}}, {"id": "m5", "en": {"title": "M5 — Osborne: Canon, Parallelism, and Dynamic Poetic Movement", "ask": "How does Hebrew poetry move rather than merely repeat?", "student": "Osborne teaches that the Psalter has a five-book canonical shape and that Hebrew parallelism is dynamic. The second line usually adds yield, nuance, contrast, intensification, or direction. The interpreter must resist collapsing the second line into the first.", "body": ["The five books of the Psalter trace movement from David's conflicts through communal crisis and exile toward reorientation, pilgrimage, and final doxology.", "Books 1–2 center on David's conflicts. Book 3 moves into deep communal crisis. Book 4 reorients the community with 'Yahweh reigns.' Book 5 moves toward return, pilgrimage, and Hallel.", "Parallelism is micro-movement. Lines that look synonymous often carry development beneath the surface. Step parallelism pushes the thought forward; climactic parallelism builds toward disclosure; antithetical parallelism creates a charged field between contrasting realities."], "check": ["What does it mean to read the second line as active until proven inert?", "How does the five-book structure shape interpretation of a single psalm?"], "guide": "Hebrew poetry forms readers through movement at both macro and micro levels: the canon has an arc, and the line pair has motion."}, "ko": {"title": "M5 — Osborne: 정경, 평행법, 역동적 시적 움직임", "ask": "히브리 시는 단순 반복이 아니라 어떻게 움직이는가?", "student": "Osborne은 시편 전체가 다섯 권의 정경적 구조를 가지고 있으며, 히브리 평행법이 역동적이라고 가르친다. 둘째 줄은 보통 결실, 뉘앙스, 대조, 강화, 방향을 더한다. 해석자는 둘째 줄을 첫째 줄에 단순히 흡수해 버리는 것을 거부해야 한다.", "body": ["시편의 다섯 권은 다윗의 갈등에서 공동체 위기와 포로를 지나 재정향, 순례, 최종 찬양으로 이동한다.", "1–2권은 다윗의 갈등을 중심으로 한다. 3권은 깊은 공동체 위기로 들어간다. 4권은 '야훼께서 다스리신다'는 고백으로 공동체의 WHERE를 재정향한다. 5권은 귀환, 순례, 할렐로 이동한다.", "평행법은 미시적 움직임이다. 동의적처럼 보이는 줄도 표면 아래에서 발전을 수행한다. 단계적 평행법은 생각을 앞으로 밀고, 절정 평행법은 드러남을 향해 쌓아 올리며, 대조 평행법은 대비되는 현실 사이에 긴장된 장을 만든다."], "check": ["둘째 줄을 inert가 증명될 때까지 active로 읽는다는 말은 무엇인가?", "다섯 권 구조는 개별 시편 해석을 어떻게 형성하는가?"], "guide": "히브리 시는 거시와 미시 양쪽에서 움직임을 통해 독자를 형성한다. 정경에는 arc가 있고, 줄쌍에는 motion이 있다."}}, {"id": "m6", "en": {"title": "M6 — Three-Stage Formation and Pastoral Triage", "ask": "Why must formation stage guide method?", "student": "The manuscript names three stages: Stage 1 dark lament with no resolution, Stage 2 lament with KAIROS pivot, and Stage 3 trust after rupture. A Stage 1 reader should not be coached toward premature Stage 3 resolution. Method must serve the worshiper's actual WHERE.", "body": ["Stage 1 is canonically legitimate. Psalm 88 ends in darkness, and the community did not remove it from Scripture. It gives voice to those who cannot yet name disclosure.", "Stage 2 names the pivot without flattening asymmetry. Psalm 22 moves from abandonment toward the claim that God has not hidden his face, and then toward future community witness.", "Stage 3 cultivates anamnesis: memory, trust, and praise after rupture, such as in Psalms 23 and 103. But Stage 3 is not a weapon to silence Stage 1."], "check": ["Why is it harmful to force Stage 3 language on a Stage 1 worshiper?", "How do Psalm 88, Psalm 22, and Psalm 23 represent different formation stages?"], "guide": "Good interpretation requires pastoral triage. The text's movement and the reader's WHERE must both be honored."}, "ko": {"title": "M6 — 세 단계 형성과 목회적 triage", "ask": "왜 형성 단계가 방법을 인도해야 하는가?", "student": "원고는 세 단계를 제시한다. Stage 1은 해결 없는 어두운 탄식, Stage 2는 KAIROS 전환점을 가진 탄식, Stage 3은 균열 이후의 신뢰이다. Stage 1 독자를 성급하게 Stage 3 해결로 코칭해서는 안 된다. 방법은 예배자의 실제 WHERE를 섬겨야 한다.", "body": ["Stage 1은 정경적으로 정당하다. 시편 88편은 어둠으로 끝나며 공동체는 그것을 성경에서 제거하지 않았다. 그것은 아직 드러남을 말할 수 없는 이들에게 목소리를 준다.", "Stage 2는 비대칭을 평면화하지 않고 전환점을 명명한다. 시편 22편은 버림받음에서 하나님이 얼굴을 숨기지 않으셨다는 주장으로, 그리고 미래 공동체 증언으로 이동한다.", "Stage 3은 anamnesis, 곧 기억, 신뢰, 찬양을 기른다. 시편 23편과 103편이 그 예이다. 그러나 Stage 3은 Stage 1을 침묵시키는 도구가 아니다."], "check": ["Stage 1 예배자에게 Stage 3 언어를 강요하는 것은 왜 해로운가?", "시편 88편, 22편, 23편은 서로 다른 형성 단계를 어떻게 보여 주는가?"], "guide": "좋은 해석은 목회적 triage를 요구한다. 본문의 움직임과 독자의 WHERE가 모두 존중되어야 한다."}}, {"id": "m7", "en": {"title": "M7 — Comparative Integration and Closing Invitation", "ask": "What kind of reader do the Psalms form?", "student": "Fee & Stuart and Osborne together resist the same dominant error: extracting propositions from the Psalms while ignoring form, address, genre, and poetic movement. The Psalms form a reader who can bring the whole self before God, trace movement carefully, and participate in communal worship without silencing grief or anger.", "body": ["Stuart is pastoral and functional: what do the Psalms do for the worshiper? Osborne is structural and canonical: how does the individual psalm fit within poetic and covenantal architecture? Together they provide a method that is structurally rigorous and pastorally attentive.", "The Psalms offer not a new set of doctrines but a vocabulary for every WHERE the worshiper inhabits and every WHO the worshiper is becoming.", "The final invitation is to enter the Psalter as a worshiper allowed to bring everything: grief, anger, unresolved complaint, and trust that coexists with all of it."], "check": ["How do Stuart's pastoral emphasis and Osborne's structural emphasis complement each other?", "What would it mean to bring your whole history before God through the Psalms?"], "guide": "The Psalms form honest covenantal worshipers who speak truthfully to God and are reshaped in community."}, "ko": {"title": "M7 — 비교 통합과 마무리 초대", "ask": "시편은 어떤 독자를 형성하는가?", "student": "Fee & Stuart와 Osborne은 함께 같은 지배적 오류를 거부한다. 그것은 시편의 형식, 호소 방향, 장르, 시적 움직임을 무시한 채 명제를 추출하는 읽기이다. 시편은 전인격을 하나님 앞에 가져오고, 움직임을 신중히 추적하며, 슬픔과 분노를 침묵시키지 않고 공동체 예배에 참여하는 독자를 형성한다.", "body": ["Stuart는 목회적이고 기능적이다. 시편은 예배자를 위해 무엇을 하는가? Osborne은 구조적이고 정경적이다. 개별 시편은 시적·언약적 아키텍처 안에 어떻게 위치하는가? 둘을 함께 읽으면 구조적으로 엄밀하고 목회적으로 주의 깊은 방법을 얻는다.", "시편은 새로운 교리 목록이 아니라, 예배자가 거주하는 모든 WHERE와 되어 가는 모든 WHO를 위한 어휘를 제공한다.", "마지막 초대는 시편 안으로 들어가는 것이다. 예배자는 슬픔, 분노, 해결되지 않은 불평, 그리고 그 모든 것과 함께 존재하는 신뢰를 모두 가져올 수 있다."], "check": ["Stuart의 목회적 강조와 Osborne의 구조적 강조는 어떻게 서로를 보완하는가?", "시편을 통해 자신의 모든 역사를 하나님 앞에 가져온다는 것은 무엇을 의미하는가?"], "guide": "시편은 하나님께 진실하게 말하고 공동체 안에서 다시 빚어지는 정직한 언약적 예배자를 형성한다."}}], "coreTexts": [{"id": "ps88", "n": 1, "dayEn": "Tuesday", "dayKo": "화요일", "refEn": "Psalm 88", "refKo": "시편 88편", "typeEn": "Dark Lament · Stage 1", "typeKo": "어두운 탄식 · Stage 1", "exeEn": "How does Psalm 88 use lament structure while refusing movement toward assurance or praise, and what does its unresolved ending disclose about the canonical legitimacy of Stage 1 voice?", "exeKo": "시편 88편은 탄식 구조를 사용하면서도 확신이나 찬양으로 이동하기를 거부한다. 이 해결되지 않은 결말은 Stage 1 목소리의 정경적 정당성에 대해 무엇을 드러내는가?", "herEn": "How should a community accompany a worshiper who remains in darkness without forcing premature resolution, praise, or spiritual performance?", "herKo": "공동체는 어둠 속에 머무는 예배자에게 성급한 해결, 찬양, 영적 연기를 강요하지 않고 어떻게 동행해야 하는가?", "scaffoldEn": "TEXT → tension/problem → movement/change → identity/community reshaping → embodied participation. Trace how this psalm moves before writing what it means today.", "scaffoldKo": "본문 → 긴장/문제 → 움직임/변화 → 정체성/공동체 재형성 → embodied participation. 오늘의 의미를 쓰기 전에 이 시편이 어떻게 움직이는지 추적하세요."}, {"id": "ps22", "n": 2, "dayEn": "Tuesday", "dayKo": "화요일", "refEn": "Psalm 22", "refKo": "시편 22편", "typeEn": "Lament with Pivot · Stage 2", "typeKo": "전환점을 가진 탄식 · Stage 2", "exeEn": "Where does Psalm 22 move from abandonment toward disclosure and future communal witness, and why must the pivot be protected without flattening the opening cry?", "exeKo": "시편 22편은 어디에서 버림받음에서 드러남과 미래 공동체 증언으로 이동하는가? 그리고 왜 그 전환점을 보호하되 첫 외침을 평면화하지 말아야 하는가?", "herEn": "How can contemporary readers name moments of KAIROS rupture without erasing the asymmetry and pain that came before the pivot?", "herKo": "오늘의 독자는 전환점 이전의 비대칭과 고통을 지우지 않으면서 KAIROS 균열의 순간을 어떻게 명명할 수 있는가?", "scaffoldEn": "TEXT → tension/problem → movement/change → identity/community reshaping → embodied participation. Trace how this psalm moves before writing what it means today.", "scaffoldKo": "본문 → 긴장/문제 → 움직임/변화 → 정체성/공동체 재형성 → embodied participation. 오늘의 의미를 쓰기 전에 이 시편이 어떻게 움직이는지 추적하세요."}, {"id": "ps23", "n": 3, "dayEn": "Tuesday", "dayKo": "화요일", "refEn": "Psalm 23", "refKo": "시편 23편", "typeEn": "Song of Trust · Stage 3", "typeKo": "신뢰의 노래 · Stage 3", "exeEn": "How does Psalm 23 form trust through spatial movement—pasture, water, valley, table, house—rather than through abstract reassurance?", "exeKo": "시편 23편은 추상적 위로가 아니라 풀밭, 물가, 골짜기, 식탁, 집이라는 공간적 움직임을 통해 어떻게 신뢰를 형성하는가?", "herEn": "How can a community cultivate anamnesis and trust after rupture without using Psalm 23 to silence those still in Psalm 88?", "herKo": "공동체는 시편 88편에 머무는 사람들을 침묵시키지 않으면서 균열 이후의 anamnesis와 신뢰를 어떻게 기를 수 있는가?", "scaffoldEn": "TEXT → tension/problem → movement/change → identity/community reshaping → embodied participation. Trace how this psalm moves before writing what it means today.", "scaffoldKo": "본문 → 긴장/문제 → 움직임/변화 → 정체성/공동체 재형성 → embodied participation. 오늘의 의미를 쓰기 전에 이 시편이 어떻게 움직이는지 추적하세요."}, {"id": "ps137", "n": 4, "dayEn": "Friday", "dayKo": "금요일", "refEn": "Psalm 137", "refKo": "시편 137편", "typeEn": "Exilic Imprecation", "typeKo": "포로기의 저주 시편", "exeEn": "How does Psalm 137 locate worship in a foreclosed exile space where captors demand songs, and how does its rage name KAIROS theft rather than private malice?", "exeKo": "시편 137편은 포로 지배자들이 노래를 요구하는 막힌 포로 공간 안에 예배를 어떻게 위치시키는가? 그 분노는 개인 악의가 아니라 KAIROS theft를 어떻게 명명하는가?", "herEn": "How can wounded communities bring rage before God without translating it into retaliation, denial, or sanitized spirituality?", "herKo": "상처 입은 공동체는 분노를 보복, 부정, 정화된 영성으로 바꾸지 않고 어떻게 하나님 앞에 가져올 수 있는가?", "scaffoldEn": "TEXT → tension/problem → movement/change → identity/community reshaping → embodied participation. Trace how this psalm moves before writing what it means today.", "scaffoldKo": "본문 → 긴장/문제 → 움직임/변화 → 정체성/공동체 재형성 → embodied participation. 오늘의 의미를 쓰기 전에 이 시편이 어떻게 움직이는지 추적하세요."}, {"id": "ps51", "n": 5, "dayEn": "Friday", "dayKo": "금요일", "refEn": "Psalm 51:1–17", "refKo": "시편 51:1–17", "typeEn": "Confession · Poetic Hyperbole", "typeKo": "고백 · 시적 과장", "exeEn": "How does Psalm 51 use poetic hyperbole and metaphor to perform confession, and why should verse 5 not be isolated as technical doctrinal exposition?", "exeKo": "시편 51편은 고백을 수행하기 위해 시적 과장과 은유를 어떻게 사용하는가? 그리고 왜 5절을 기술적 교리 설명으로 고립시켜서는 안 되는가?", "herEn": "How can confession remain honest and whole-psalm grounded rather than becoming either self-condemnation or abstract doctrine?", "herKo": "고백은 자기정죄나 추상 교리가 되지 않고 어떻게 정직하고 전체 시편에 근거한 말하기가 될 수 있는가?", "scaffoldEn": "TEXT → tension/problem → movement/change → identity/community reshaping → embodied participation. Trace how this psalm moves before writing what it means today.", "scaffoldKo": "본문 → 긴장/문제 → 움직임/변화 → 정체성/공동체 재형성 → embodied participation. 오늘의 의미를 쓰기 전에 이 시편이 어떻게 움직이는지 추적하세요."}, {"id": "ps103", "n": 6, "dayEn": "Friday", "dayKo": "금요일", "refEn": "Psalm 103", "refKo": "시편 103편", "typeEn": "Praise · Anamnesis", "typeKo": "찬양 · Anamnesis", "exeEn": "How does Psalm 103 cultivate communal memory of mercy through praise, and how does its movement from personal blessing to cosmic praise shape covenant identity?", "exeKo": "시편 103편은 찬양을 통해 자비에 대한 공동 기억을 어떻게 기르는가? 개인적 송축에서 우주적 찬양으로 이동하는 구조는 언약 정체성을 어떻게 형성하는가?", "herEn": "How can praise become communal anamnesis that remembers God's mercy without denying lament, exile, or unresolved suffering?", "herKo": "찬양은 탄식, 포로, 해결되지 않은 고난을 부정하지 않으면서 하나님의 자비를 기억하는 공동체적 anamnesis가 어떻게 될 수 있는가?", "scaffoldEn": "TEXT → tension/problem → movement/change → identity/community reshaping → embodied participation. Trace how this psalm moves before writing what it means today.", "scaffoldKo": "본문 → 긴장/문제 → 움직임/변화 → 정체성/공동체 재형성 → embodied participation. 오늘의 의미를 쓰기 전에 이 시편이 어떻게 움직이는지 추적하세요."}], "mcq": [{"qEn": "What is the first hermeneutical shift required by the Psalms?", "qKo": "시편이 요구하는 첫 해석학적 전환은 무엇인가?", "optsEn": ["From upward prayer to direct command extraction", "From propositional extraction to covenantal address", "From poetry to systematic doctrine", "From lament to immediate praise"], "optsKo": ["위로 향한 기도에서 직접 명령 추출로", "명제 추출에서 언약적 호소로", "시에서 조직 교리로", "탄식에서 즉각 찬양으로"], "a": 1}, {"qEn": "According to Fee & Stuart, the Psalms are best read as what?", "qKo": "Fee & Stuart에 따르면 시편은 무엇으로 읽는 것이 가장 적절한가?", "optsEn": ["Musical poems and prayers", "Legal codes", "Narrative histories", "Doctrinal summaries"], "optsKo": ["음악적 시와 기도", "법전", "서사 역사", "교리 요약"], "a": 0}, {"qEn": "Why is Psalm 88 important for formation?", "qKo": "시편 88편은 형성에 왜 중요한가?", "optsEn": ["It proves every lament must end in praise", "It canonizes unresolved Stage 1 voice", "It removes complaint from worship", "It explains all suffering systematically"], "optsKo": ["모든 탄식은 찬양으로 끝나야 함을 증명하기 때문에", "해결되지 않은 Stage 1 목소리를 정경화하기 때문에", "불평을 예배에서 제거하기 때문에", "모든 고난을 체계적으로 설명하기 때문에"], "a": 1}, {"qEn": "What does dynamic parallelism usually mean?", "qKo": "역동적 평행법은 보통 무엇을 의미하는가?", "optsEn": ["The second line is useless repetition", "The second line adds movement, nuance, or yield", "Parallel lines should be ignored", "Only the first line matters"], "optsKo": ["둘째 줄은 무의미한 반복이다", "둘째 줄은 움직임, 뉘앙스, 결실을 더한다", "평행 줄은 무시해야 한다", "첫째 줄만 중요하다"], "a": 1}, {"qEn": "How should imprecatory psalms be handled?", "qKo": "저주 시편은 어떻게 다루어야 하는가?", "optsEn": ["As permission for retaliation", "As embarrassing texts to omit", "As covenantal anger released to God", "As proof that lament is spiritually immature"], "optsKo": ["보복 허가로", "생략해야 할 불편한 본문으로", "하나님께 release되는 언약적 분노로", "탄식이 영적으로 미성숙하다는 증거로"], "a": 2}, {"qEn": "Why should Psalm 51:5 not be isolated as technical doctrine?", "qKo": "왜 시편 51:5를 기술적 교리로 고립시켜서는 안 되는가?", "optsEn": ["Because poetry uses hyperbole and metaphor within whole-psalm movement", "Because the verse is unimportant", "Because confession has no theology", "Because metaphor has no meaning"], "optsKo": ["시는 전체 시편의 움직임 안에서 과장과 은유를 사용하기 때문에", "그 절은 중요하지 않기 때문에", "고백에는 성경적 사유가 없기 때문에", "은유에는 의미가 없기 때문에"], "a": 0}, {"qEn": "What is the student-facing integration process called in this app?", "qKo": "이 앱에서 학생용 통합 과정은 무엇이라 부르는가?", "optsEn": ["Model Movement Sentence", "Doctrine Extraction Formula", "Integration Movement Scaffold / How Meaning Moves", "Systematic Theology Grid"], "optsKo": ["Model Movement Sentence", "교리 추출 공식", "Integration Movement Scaffold / How Meaning Moves", "조직신학 격자"], "a": 2}, {"qEn": "What must happen before contemporary application?", "qKo": "현대 적용 전에 무엇이 먼저 일어나야 하는가?", "optsEn": ["The reader must remain inside the text's world and trace its movement", "The reader should decide a doctrine first", "The reader should skip genre", "The reader should modernize immediately"], "optsKo": ["독자가 본문의 세계 안에 머물며 그 움직임을 추적해야 한다", "먼저 교리를 결정해야 한다", "장르를 건너뛰어야 한다", "즉시 현대화해야 한다"], "a": 0}]};
const LS='BH13_Psalms_Adaptive_v1';
let lang=localStorage.getItem(LS+':lang')||'en';
let active=localStorage.getItem(LS+':active')||'overview';
let visited=new Set(JSON.parse(localStorage.getItem(LS+':visited')||'["overview"]'));
function tr(en,ko){return lang==='ko'?ko:en}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1600)}
function setLang(l){lang=l;localStorage.setItem(LS+':lang',l);render()}
function resetProgress(){if(confirm(tr('Reset progress and reflections?','진행률과 성찰을 초기화할까요?'))){Object.keys(localStorage).filter(k=>k.startsWith(LS)).forEach(k=>localStorage.removeItem(k));location.reload()}}
const navItems=[['overview','Overview','개요'],['modules','Lecture Modules','강의 모듈'],['scholars','Scholar Lenses','학자 렌즈'],['glossary','Glossary','용어 사전'],['texts','Core Texts','핵심 본문'],['mcq','Self-Assessment','자가 점검'],['reflection','Reflection + Export','성찰 + 내보내기']];
function go(id){active=id;visited.add(id);localStorage.setItem(LS+':active',id);localStorage.setItem(LS+':visited',JSON.stringify([...visited]));render();document.getElementById('main').scrollTo({top:0,behavior:'smooth'})}
function updateProgress(){const fields=['insight','tension','question','movement','practice'];let done=fields.filter(f=>(localStorage.getItem(LS+':'+f)||'').trim().length>5).length;let pct=Math.round(((visited.size/navItems.length)*0.55+(done/fields.length)*0.45)*100);document.getElementById('progressText').textContent=pct+'%';document.getElementById('progressBar').style.width=pct+'%'}
function renderChrome(){const m=DATA.meta[lang];document.documentElement.lang=lang;document.title='BH Week 13 Psalms Adaptive Learning';document.getElementById('brandCourse').textContent=m.course;document.getElementById('brandTitle').textContent=m.title;document.getElementById('brandSubtitle').textContent=m.subtitle;document.getElementById('progressLabel').textContent=tr('Progress','진행률');document.getElementById('enBtn').classList.toggle('active',lang==='en');document.getElementById('koBtn').classList.toggle('active',lang==='ko');document.getElementById('nav').innerHTML=navItems.map((n,i)=>`<button class="${active===n[0]?'active':''}" onclick="go('${n[0]}')"><span class="navnum">${i+1}</span><span>${tr(n[1],n[2])}</span></button>`).join('')}
function section(html){return `<section class="section active">${html}</section>`}
function renderOverview(){const m=DATA.meta[lang];return section(`<div class="hero"><div class="course">${esc(m.course)}</div><h1>${esc(m.title)}</h1><p class="subtitle">${esc(m.subtitle)}</p><div class="pill-row"><span class="pill">Fee & Stuart</span><span class="pill">Grant Osborne</span><span class="pill">WHERE · WHO · WHAT</span><span class="pill">How Meaning Moves</span></div></div><div class="card"><h2>${esc(m.orientationTitle)}</h2><p>${esc(m.orientation)}</p></div><div class="card"><h2>${esc(m.claimTitle)}</h2><p>${esc(m.claim)}</p></div><div class="grid three"><div class="card"><h3>WHERE</h3><p>${esc(m.where)}</p></div><div class="card"><h3>WHO</h3><p>${esc(m.who)}</p></div><div class="card"><h3>WHAT</h3><p>${esc(m.what)}</p></div></div><div class="card"><h2>${tr('Interpretive Rule','해석 규칙')}</h2><p>${tr('Enter the text-world first. Trace narrative, poetic, relational, spatial, and covenantal movement before contemporary interpretation. Scholars are dialogue partners, not final authorities.','먼저 본문의 세계 안으로 들어가세요. 현대 해석 전에 서사적, 시적, 관계적, 공간적, 언약적 움직임을 추적하세요. 학자는 최종 권위가 아니라 대화 파트너입니다.')}</p></div>`)}
function renderModules(){return section(`<div class="hero"><h1>${tr('Lecture Modules','강의 모듈')}</h1><p class="subtitle">${tr('Each module keeps the Psalms inside their poetic, covenantal, and formational movement.','각 모듈은 시편을 시적, 언약적, 형성적 움직임 안에 머물게 합니다.')}</p></div>`+DATA.modules.map((mod,i)=>{const x=mod[lang];return `<div class="card"><div class="pedagogy-strip"><span>${tr('Question','질문')}</span><span>${tr('Plain Entry','쉬운 진입')}</span><span>${tr('Movement','움직임')}</span><span>${tr('Practice','실습')}</span><span>${tr('Formation','형성')}</span></div><h2>${esc(x.title)}</h2><p class="module-question">${esc(x.ask)}</p><p>${esc(x.student)}</p>${x.body.map(p=>`<p>${esc(p)}</p>`).join('')}<h3>${tr('Check your understanding','이해 점검')}</h3><ul>${x.check.map(q=>`<li>${esc(q)}</li>`).join('')}</ul><div class="guide"><strong>${tr('Guide','가이드')}:</strong> ${esc(x.guide)}</div></div>`}).join(''))}
function renderScholars(){return section(`<div class="hero"><h1>${tr('Scholar Lenses','학자 렌즈')}</h1><p class="subtitle">${tr('Use scholars as dialogue partners who sharpen attention to the text, not as final authorities.','학자는 본문에 대한 주의를 날카롭게 하는 대화 파트너이지 최종 권위가 아닙니다.')}</p></div><div class="grid two">`+DATA.scholars.map(s=>`<div class="card"><h3>${esc(s.name)}</h3><p>${esc(lang==='ko'?s.ko:s.en)}</p></div>`).join('')+`</div>`)}
function renderGlossary(){return section(`<div class="hero"><h1>${tr('Glossary','용어 사전')}</h1></div><div class="grid two">`+DATA.glossary.map(g=>`<div class="card"><h3>${esc(g.term)}</h3><p>${esc(lang==='ko'?g.ko:g.en)}</p></div>`).join('')+`</div>`)}
function renderTexts(){let html=`<div class="hero"><h1>${tr('Core Texts','핵심 본문')}</h1><p class="subtitle">${tr('Each psalm includes one exegetical question, one hermeneutical question, and an Integration Movement Scaffold / How Meaning Moves prompt.','각 시편은 주해 질문 하나, 해석학 질문 하나, Integration Movement Scaffold / How Meaning Moves 프롬프트 하나를 포함합니다.')}</p></div>`;['Tuesday','Friday'].forEach(day=>{html+=`<div class="card"><h2>${tr(day,day==='Tuesday'?'화요일':'금요일')}</h2>`+DATA.coreTexts.filter(t=>t.dayEn===day).map(t=>`<div class="question-card"><span class="pill">${esc(tr(t.typeEn,t.typeKo))}</span><h3>${t.n}. ${esc(tr(t.refEn,t.refKo))}</h3><p><strong>${tr('Exegetical Question','주해 질문')}:</strong> ${esc(tr(t.exeEn,t.exeKo))}</p><p><strong>${tr('Hermeneutical Question','해석학 질문')}:</strong> ${esc(tr(t.herEn,t.herKo))}</p><div class="scaffold">${tr('Integration Movement Scaffold / How Meaning Moves','통합 움직임 스캐폴드 / 의미가 움직이는 방식')}<br>${esc(tr(t.scaffoldEn,t.scaffoldKo))}</div></div>`).join('')+`</div>`});return section(html)}
function renderMCQ(){let html=`<div class="hero"><h1>${tr('Self-Assessment','자가 점검')}</h1><p class="subtitle">${tr('This checks method, not memorized doctrine.','이 점검은 암기된 교리가 아니라 방법을 확인합니다.')}</p></div><div class="card">`;DATA.mcq.forEach((q,i)=>{html+=`<div class="question-card" data-mcq="${i}"><h3>${i+1}. ${esc(tr(q.qEn,q.qKo))}</h3>${(lang==='ko'?q.optsKo:q.optsEn).map((o,j)=>`<button class="mcq-option" onclick="choose(${i},${j})">${esc(o)}</button>`).join('')}</div>`});html+=`<button class="primary" onclick="grade()">${tr('Grade MCQ','선다형 채점')}</button><p id="mcqScore" class="guide"></p></div>`;return section(html)}
function choose(i,j){localStorage.setItem(LS+':mcq:'+i,j);render()}
function grade(){let score=0;DATA.mcq.forEach((q,i)=>{if(Number(localStorage.getItem(LS+':mcq:'+i))===q.a)score++});document.getElementById('mcqScore').textContent=tr('Score','점수')+`: ${score}/${DATA.mcq.length}`;document.querySelectorAll('[data-mcq]').forEach((card,i)=>{card.querySelectorAll('.mcq-option').forEach((b,j)=>{b.classList.remove('correct','wrong');if(j===DATA.mcq[i].a)b.classList.add('correct');else if(Number(localStorage.getItem(LS+':mcq:'+i))===j)b.classList.add('wrong')})})}
function setField(id,v){localStorage.setItem(LS+':'+id,v);updateProgress()}
function getField(id){return localStorage.getItem(LS+':'+id)||''}
function exportObj(){const m=DATA.meta[lang];return {timestamp:new Date().toISOString(),course:DATA.meta.course,week:DATA.meta.week,topic:DATA.meta.topic,language:lang,student:{name:getField('name'),id:getField('studentId'),classRoute:getField('classRoute')||'BH'},reflections:{insight:getField('insight'),tension:getField('tension'),question:getField('question'),movement:getField('movement'),practice:getField('practice')},progress:{visited:[...visited],percent:document.getElementById('progressText').textContent},metadata:{source:m.sources,exportType:'adaptive-active-language-only'}}}
function download(name,text,type){const blob=new Blob([text],{type});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
function renderReflection(){let obj=exportObj();let preview=JSON.stringify(obj,null,2);return section(`<div class="hero"><h1>${tr('Reflection + Export','성찰 + 내보내기')}</h1><p class="subtitle">${tr('Carry one insight, one unresolved tension, one question, one movement statement, and one embodied practice into Active Learning.','통찰 하나, 남은 긴장 하나, 질문 하나, 움직임 문장 하나, embodied practice 하나를 Active Learning으로 가져가세요.')}</p></div><div class="card"><div class="grid two"><div><label>${tr('Student Name','학생 이름')}</label><input value="${esc(getField('name'))}" oninput="setField('name',this.value)"><label>${tr('Student ID','학번')}</label><input value="${esc(getField('studentId'))}" oninput="setField('studentId',this.value)"><label>${tr('Class Route','분반')}</label><input value="${esc(getField('classRoute')||'BH')}" oninput="setField('classRoute',this.value)"></div><div><label>${tr('One insight','통찰 하나')}</label><textarea oninput="setField('insight',this.value)">${esc(getField('insight'))}</textarea></div></div><label>${tr('One unresolved tension','남은 긴장 하나')}</label><textarea oninput="setField('tension',this.value)">${esc(getField('tension'))}</textarea><label>${tr('One question','질문 하나')}</label><textarea oninput="setField('question',this.value)">${esc(getField('question'))}</textarea><label>${tr('How Meaning Moves','의미가 움직이는 방식')}</label><textarea oninput="setField('movement',this.value)" placeholder="TEXT → tension/problem → movement/change → identity/community reshaping → embodied participation">${esc(getField('movement'))}</textarea><label>${tr('Embodied practice for this week','이번 주 embodied practice')}</label><textarea oninput="setField('practice',this.value)">${esc(getField('practice'))}</textarea><div class="row"><button class="primary" onclick="download('${DATA.meta.week}_BH_${lang}_adaptive_reflection.json', JSON.stringify(exportObj(),null,2),'application/json')">${tr('Download JSON','JSON 다운로드')}</button><button onclick="navigator.clipboard.writeText(JSON.stringify(exportObj(),null,2)).then(()=>toast(tr('Copied','복사됨')))">${tr('Copy JSON','JSON 복사')}</button></div><h3>${tr('Export Preview','내보내기 미리보기')}</h3><textarea readonly style="min-height:320px">${esc(preview)}</textarea></div>`)}
function render(){renderChrome();let html='';if(active==='overview')html=renderOverview();if(active==='modules')html=renderModules();if(active==='scholars')html=renderScholars();if(active==='glossary')html=renderGlossary();if(active==='texts')html=renderTexts();if(active==='mcq')html=renderMCQ();if(active==='reflection')html=renderReflection();document.getElementById('main').innerHTML=html;updateProgress();for(let i=0;i<DATA.mcq.length;i++){let j=localStorage.getItem(LS+':mcq:'+i);if(j!==null){let card=document.querySelector(`[data-mcq="${i}"]`);if(card){let btn=card.querySelectorAll('.mcq-option')[Number(j)];if(btn)btn.classList.add('active')}}}}
render();
</script>
</body>
</html>
