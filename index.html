<div class="app"><aside><div class="brand"><div class="course" id="brandCourse"></div><h2 id="brandTitle"></h2><p class="subtitle" id="brandSubtitle"></p><div class="lang-row"><button id="enBtn" class="active" onclick="setLang('en')">EN</button><button id="koBtn" onclick="setLang('ko')">한국어</button></div><div class="tool-row"><button onclick="window.print()">Print / PDF</button><button onclick="resetProgress()">Reset</button></div><div class="progress-wrap"><div class="progress-label"><span id="progressLabel"></span><span id="progressText">0%</span></div><div class="progress-track"><div class="progress-bar" id="progressBar"></div></div></div></div><div class="nav" id="nav"></div></aside><main id="main"></main></div>
<script>
const DATA = [{"id": "overview", "nav_en": "Overview", "nav_ko": "개요", "en": "<div class=\"hero\"><div class=\"course\">GEK20070-01 · Biblical Hermeneutics · Week 13</div><h1>The Prophets: Covenant Enforcement and Biblical Hermeneutics</h1><p class=\"subtitle\">Hearing the Prophets as Forth-Tellers, Covenant Mediators, and Illumined Guides</p><div class=\"pill-row\"><span class=\"pill\">Fee & Stuart</span><span class=\"pill\">Grant R. Osborne</span><span class=\"pill\">WHERE · WHO · WHAT</span><span class=\"pill\"></span></div></div>\n<div class=\"grid three\"><div class=\"card\"><h3>WHERE</h3><p>A covenant courtroom: God, the divine Suzerain, brings a formal lawsuit against Israel in the historical crisis of the eighth to fifth centuries BC.</p></div><div class=\"card\"><h3>WHO</h3><p>The reader moves from fortune-teller hunter to illumined participant, hearing the prophetic word first in its own covenantal moment.</p></div><div class=\"card\"><h3>WHAT</h3><p>The vocation is covenant loyalty and orthopraxy: not only correct belief, but embodied faithfulness in community.</p></div></div>\n<div class=\"card\"><h2>Preservation Logic</h2><p>This version preserves the manuscript's teaching pedagogy while enforcing emic biblical studies: students first inhabit the prophetic text-world, trace covenantal movement, identify spatial/social dynamics, and then move toward embodied participation. Student-facing integration uses the Integration Movement Scaffold / How Meaning Moves rather than polished copyable answers.</p></div>", "ko": "<div class=\"hero\"><div class=\"course\">GEK20070-01 · 성경해석학 · 13주차</div><h1>예언서: 언약 집행과 성경해석학</h1><p class=\"subtitle\">예언자를 미래 예언가가 아니라 하나님의 말씀을 자기 시대에 선포한 언약 중재자와 조명받은 안내자로 듣기</p><div class=\"pill-row\"><span class=\"pill\">Fee & Stuart</span><span class=\"pill\">Grant R. Osborne</span><span class=\"pill\">WHERE · WHO · WHAT</span><span class=\"pill\"></span></div></div>\n<div class=\"grid three\"><div class=\"card\"><h3>WHERE</h3><p>언약 법정이다. 하나님은 신적 종주로서 이스라엘을 향해 공식적 소송을 제기하신다. 이 장은 막연한 미래가 아니라 주전 8–5세기의 역사적 위기이다.</p></div><div class=\"card\"><h3>WHO</h3><p>독자는 현대 사건의 암호를 찾는 “미래 예언 사냥꾼”에서, 예언자의 말씀을 먼저 그 시대의 언약적 순간 안에서 듣는 조명받은 참여자로 이동한다.</p></div><div class=\"card\"><h3>WHAT</h3><p>소명은 언약 충성과 orthopraxy, 곧 바른 이해만이 아니라 공동체 안에서 구현되는 신실한 삶이다.</p></div></div>\n<div class=\"card\"><h2>보존 원리</h2><p>이 버전은 원고의 교육학적 흐름을 보존한다. 학생 오리엔테이션, 쉬운 언어의 진입, 심화 설명, 연습과 확인 질문, 모듈 인덱스, 핵심 용어, WHERE–WHO–WHAT 앵커, 핵심 본문 실습, 해석학적 나선, 최종 형성 종합을 포함한다.</p></div>"}, {"id": "orientation", "nav_en": "Student Orientation", "nav_ko": "학생 오리엔테이션", "en": "<div class=\"hero\"><div class=\"course\">Student Orientation</div><h1>🎓 Student Orientation: Why This Matters This Week</h1></div><div class=\"card\"><p>In this week&#x27;s lecture we will learn how to hear the Prophets in the right way. Instead of treating them like fortune-tellers about our future, we will see them as God&#x27;s messengers who spoke first to their own time. By the end, you should be able to explain what a prophet&#x27;s main job was, recognize a few main prophetic forms (judgment, woe, lawsuit, promise, symbolic action), and connect a prophetic passage to its situation in Israel&#x27;s history. You will also practice a simple two-step method: first understand &quot;what it meant then,&quot; and then ask &quot;what it means here and now&quot; for your life and community. Keep these two questions with you as you read: What was happening in Israel when this prophet spoke? And what does God&#x27;s word in that moment say to my community today? By the end of the session, you will have a toolkit — not just a set of facts. Use it on every prophetic passage you open from now on.</p></div><div class=\"grid three\"><div class=\"card\"><h3>Learning Goal</h3><p>Explain what prophets mainly did.</p></div><div class=\"card\"><h3>Method Goal</h3><p>Recognize judgment, woe, lawsuit, promise, and symbolic action.</p></div><div class=\"card\"><h3>Formation Goal</h3><p>Move from “what it meant then” to “what it means here and now.”</p></div></div>", "ko": "<div class=\"hero\"><div class=\"course\">학생 오리엔테이션</div><h1>🎓 왜 이번 주가 중요한가</h1></div><div class=\"card\"><p>이번 주 강의에서 우리는 예언서를 올바르게 듣는 법을 배운다. 예언자를 우리 미래에 대한 점쟁이처럼 대하지 않고, 자기 시대의 사람들에게 먼저 말씀하신 하나님의 메신저로 보게 된다. 수업이 끝날 때 학생은 예언자의 주된 직무가 무엇인지 설명하고, 심판, 화, 소송, 약속, 상징 행위와 같은 주요 예언 형식을 구별하며, 예언 본문을 이스라엘 역사의 구체적 상황과 연결할 수 있어야 한다.</p><p>또한 단순한 두 단계 방법을 연습한다. 먼저 “그때 그 본문이 무엇을 의미했는가”를 이해하고, 그 다음 “지금 여기에서 나와 공동체에게 무엇을 의미하는가”를 묻는다. 읽을 때 두 질문을 붙들라. 이 예언자가 말할 때 이스라엘에는 무슨 일이 일어나고 있었는가? 그 순간의 하나님의 말씀은 오늘 우리 공동체에게 무엇을 말하는가? 이 수업의 목표는 단순한 지식 목록이 아니라, 앞으로 어떤 예언 본문을 열 때마다 사용할 수 있는 해석 도구를 얻는 것이다.</p></div><div class=\"grid three\"><div class=\"card\"><h3>학습 목표</h3><p>예언자가 주로 무엇을 했는지 설명한다.</p></div><div class=\"card\"><h3>방법 목표</h3><p>심판, 화, 소송, 약속, 상징 행위를 구별한다.</p></div><div class=\"card\"><h3>형성 목표</h3><p>“그때의 의미”에서 “지금 여기의 의미”로 책임 있게 이동한다.</p></div></div>"}, {"id": "architecture", "nav_en": "Architecture Brief", "nav_ko": "아키텍처 브리프", "en": "<div class=\"hero\"><div class=\"course\">Instructor Scaffold</div><h1>Part 0 — Architecture Brief</h1><p class=\"subtitle\">Professor-only section. Not distributed to students; included here as a collapsed audit scaffold for app completeness.</p></div><div class=\"card instructor-note\"><h3>Source Inventory</h3><p>Fee &amp; Stuart — Primary: How to Read the Bible for All Its Worth. Chapter 10: &quot;The Prophets: Enforcing the Covenant in Israel&quot;; Introduction: &quot;The Need to Interpret.&quot;</p><p>Osborne — Secondary: The Hermeneutical Spiral. Chapter 10: &quot;Prophecy&quot; [pp. 111–162]; Preface and Introduction [pp. 398–413]; Chapters 1–2 (Context, Grammar), 3–5 (Semantics, Syntax, Backgrounds), 6–7 (Genre, Law, Narrative), 8–12 (Poetry, Wisdom, Prophecy, Apocalyptic, Parable), 13–14 (Epistle, OT in NT).</p><h3>Unified Hermeneutical Claim</h3><p>The Prophetic Books are not a coded archive of predictions about distant modern events. They are the authoritative speech of covenant enforcement mediators — ambassadors divinely compelled to apply the established legal stipulations of the Torah to the immediate national crises of their own generation. Hearing them correctly requires two interlocking disciplines: rigorous exegesis anchored in the historical particularity of the eighth to fifth centuries BC, and a hermeneutical spiral that moves from that original meaning toward contemporary significance without collapsing the distance between the two horizons.</p><h3>Consolidated Key Term Lexicon</h3><h3>WHERE · WHO · WHAT Anchor</h3><p>WHERE: A Covenant Courtroom. God, the divine Suzerain, brings a formal lawsuit (rîb) against Israel, the unfaithful vassal, for breaking the Sinai stipulations. The relational field is not a speculative future but a specific historical crisis: the political and religious upheaval of the eighth to fifth centuries BC.</p><p>WHO: The reader as Illumined Participant. The prior WHO is the &quot;fortune-teller hunter&quot; who searches these books for a coded map of modern events. The nascent WHO is an illumined reader — neither an inspired writer nor a neutral observer — who identifies with the implied audience called to repentance and covenant loyalty, capable of perceiving but not independently generating sensus plenior.</p><p>WHAT: The vocation of Covenant Loyalty and Orthopraxy. The prophetic texts do not call primarily for intellectual curiosity but for the dual practice of orthodoxy (correct belief about God&#x27;s covenantal character) and orthopraxy (correct living in response to it). The hermeneutical task is complete only when the ancient word has been translated into contemporary reformation.</p><h3>Consolidated Key Term Lexicon</h3><div class=\"table-scroll\"><table class=\"data-table\">\n<tr><th>Term</th><th>Scholar(s)</th><th>Definition</th><th>SCL</th></tr>\n<tr><td>Forth-telling</td><td>Fee &amp; Stuart, Osborne</td><td>Speaking God&#x27;s word directly to one&#x27;s own contemporaries; the primary function of the prophetic vocation.</td><td>SCL-1</td></tr>\n<tr><td>Fore-telling</td><td>Fee &amp; Stuart, Osborne</td><td>Predicting future events; a secondary instrument subordinate to forth-telling, comprising less than 2% of the prophetic corpus.</td><td>SCL-1</td></tr>\n<tr><td>Covenant Enforcement Mediator</td><td>Stuart, Osborne</td><td>One who announces the enforcement of God&#x27;s already-established law — blessings for fidelity, curses (the Ten D&#x27;s) for disobedience — rather than inventing new theology.</td><td>SCL-1</td></tr>\n<tr><td>The Ten D&#x27;s</td><td>Stuart</td><td>Ten categories of covenantal curse: death, disease, drought, dearth, danger, destruction, defeat, deportation, destitution, and disgrace.</td><td>SCL-1</td></tr>\n<tr><td>Oracle</td><td>Stuart</td><td>A discrete spoken message from God, typically in poetic form, serving as the basic compositional unit of the prophetic books.</td><td>SCL-1</td></tr>\n<tr><td>Nābīʾ (נָבִיא)</td><td>Osborne</td><td>The Hebrew term for &quot;prophet,&quot; carrying both a passive side (receiving revelation) and an active side (proclaiming it).</td><td>SCL-1</td></tr>\n<tr><td>Judgment Speech</td><td>Osborne</td><td>The foundational prophetic form: a messenger formula followed by an accusation and an announcement of coming disaster.</td><td>SCL-1</td></tr>\n<tr><td>Woe Oracle</td><td>Osborne</td><td>A judgment prophecy opening with hôy (&quot;woe&quot;), drawn from the register of funeral lament to signal impending sorrow.</td><td>SCL-1</td></tr>\n<tr><td>Rîb (רִיב)</td><td>Stuart, Osborne</td><td>The covenant lawsuit form: God acts simultaneously as suzerain, plaintiff, and judge, summoning Israel to the divine law court.</td><td>SCL-1</td></tr>\n<tr><td>Sensus Plenior</td><td>Stuart, Osborne</td><td>A &quot;fuller meaning&quot; of a text, identified by New Testament writers under inspiration, but not independently available to the modern illumined reader.</td><td>SCL-2</td></tr>\n<tr><td>Hermeneutical Spiral</td><td>Osborne</td><td>An open-ended, iterative movement from the original horizon of the text toward the horizon of the contemporary reader, narrowing progressively toward intended meaning.</td><td>SCL-2</td></tr>\n<tr><td>Exegesis</td><td>Fee &amp; Stuart, Osborne</td><td>The systematic, historically anchored task of determining what the text meant in its original &quot;then and there&quot; context.</td><td>SCL-1</td></tr>\n<tr><td>Hermeneutics</td><td>Fee &amp; Stuart</td><td>The subsequent task of discerning what the text means in the contemporary &quot;here and now,&quot; always controlled by the results of exegesis.</td><td>SCL-1</td></tr>\n<tr><td>Historical Particularity</td><td>Fee</td><td>The condition that each biblical document is irreducibly shaped by the specific language, culture, and time of its original composition.</td><td>SCL-1</td></tr>\n<tr><td>Orthopraxy</td><td>Stuart, Osborne</td><td>Correct living as the telos of prophetic hearing: the covenant call is not merely cognitive assent but embodied, ethical faithfulness.</td><td>SCL-1</td></tr>\n</table></div></div>", "ko": "<div class=\"hero\"><div class=\"course\">교수자 스캐폴드</div><h1>Part 0 — Architecture Brief</h1><p class=\"subtitle\">교수자 전용 섹션이다. 원래 학생 배포용은 아니지만, 앱의 완전성과 감사 가능성을 위해 접힌 구조의 스캐폴드로 포함했다.</p></div><div class=\"card instructor-note\"><h3>Source Inventory</h3><p>Fee & Stuart의 『How to Read the Bible for All Its Worth』 10장 “The Prophets: Enforcing the Covenant in Israel”과 서론 “The Need to Interpret”가 1차 자료이다. Osborne의 『The Hermeneutical Spiral』 10장 “Prophecy”와 서론 및 장르·문맥·문법 관련 장들이 2차 자료이다.</p><h3>Unified Hermeneutical Claim</h3><p>예언서는 현대의 먼 사건을 암호화해 둔 예측 저장고가 아니다. 예언서는 권위 있는 언약 집행의 말씀이며, 예언자들은 토라에 이미 주어진 언약 규정을 자기 세대의 즉각적 국가 위기에 적용하도록 강제된 하나님의 사절이다. 올바른 청취는 주전 8–5세기의 역사적 특수성에 뿌리내린 엄밀한 주해와, 원래 의미에서 오늘의 의미로 이동하는 해석학적 나선을 함께 요구한다.</p><h3>WHERE · WHO · WHAT Anchor</h3><p><strong>WHERE:</strong> 언약 법정이다. 하나님은 신적 종주로서 시내산 규정을 어긴 이스라엘을 향해 rîb, 곧 언약 소송을 제기하신다. 관계적 장은 추상적 미래가 아니라 주전 8–5세기의 정치적·종교적 위기이다.</p><p><strong>WHO:</strong> 독자는 조명받은 참여자이다. 이전의 독자는 현대 사건의 암호 지도를 찾는 “미래 예언 사냥꾼”이다. 새롭게 형성되는 독자는 영감받은 저자도, 중립 관찰자도 아니라, 회개와 언약 충성으로 부름받은 암시된 청중과 자신을 동일시하는 조명받은 독자이다.</p><p><strong>WHAT:</strong> 소명은 언약 충성과 orthopraxy이다. 예언 본문은 지적 호기심이 아니라 하나님의 언약적 성품에 대한 바른 믿음과 그에 응답하는 바른 삶을 요청한다. 고대 말씀이 오늘의 개혁으로 번역될 때 해석학적 과제는 완성된다.</p></div>"}, {"id": "m1", "nav_en": "M1", "nav_ko": "M1", "en": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M1 — Dismantling the Predictive Myth</h1></div>\n<div class=\"pedagogy-strip\"><span>Question</span><span>Plain Entry</span><span>Deep Dive</span><span>Practice</span><span>Formation</span></div>\n<div class=\"card module-card\">\n<p class=\"module-question\">In this module we will ask: What do most people get wrong about the Prophets, and what do scholars say instead?</p>\n<h3 class=\"section-marker plain\">📖 BH Student Version (Plain English First)</h3>\n<p>Many Christians think the Prophets are mainly about predicting events in our future. But scholars like Fee and Stuart show that only a very small part of prophetic texts work that way. Most prophetic messages were spoken to real people, in real crises, between about 760 and 460 BC. The prophets were not trying to give us a secret code about 21st-century news; they were calling Israel back to God&#x27;s covenant in their own day.</p>\n<h3 class=\"section-marker\">Deep Dive</h3>\n<p>We begin with a confession about the WHERE most readers bring to these sixteen books. The dominant popular assumption is that the prophets are primarily fortune-tellers — that their primary service to the church is a coded archive of predictions about distant modern events, available for deciphering by those who compare the right headlines with the right verses. Both Douglas Stuart and Grant Osborne open their treatment of the prophetic corpus by naming this assumption as a fundamental misreading, and the statistical reality should arrest us immediately: less than 2 percent of Old Testament prophecy is directly messianic, less than 5 percent concerns the new-covenant age, and less than 1 percent addresses events that remain future to our own time.</p>\n<p>The primary function of the prophet, both scholars insist, is not foretelling but forthtelling — speaking for God to their own contemporaries in the midst of a specific historical crisis. The relational field is not a crystal ball suspended above time but a contested covenant relationship set firmly within a three-century window of unprecedented political and religious upheaval: roughly 760 to 460 BC, from the Assyrian threat under Amos and Hosea through the Babylonian exile and into the post-exilic reconstruction.</p>\n<p>Until readers recalibrate their entry point from predictive curiosity to covenantal attention, the prophetic books will remain permanently opaque — or worse, permanently pliable to whatever contemporary crisis the interpreter is already convinced they address.</p>\n<h3 class=\"section-marker check\">Check your understanding:</h3>\n<ul class=\"practice-list\">\n<li>In one sentence, what is the difference between &quot;fore-telling&quot; and &quot;forth-telling&quot;?</li>\n<li>Why does it matter that less than 2% of prophecy is directly messianic?</li>\n</ul>\n</div>", "ko": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M1 — 예측 신화를 해체하기</h1></div><div class=\"pedagogy-strip\"><span>질문</span><span>쉬운 진입</span><span>심화</span><span>실습</span><span>형성</span></div><div class=\"card module-card\"><p class=\"module-question\">이 모듈에서 우리는 묻는다. 사람들이 예언서에 대해 가장 흔히 오해하는 것은 무엇이며, 학자들은 그 대신 무엇을 말하는가?</p><h3 class=\"section-marker plain\">📖 BH Student Version (Plain English First)</h3><p>많은 그리스도인은 예언서가 주로 우리의 미래 사건을 예측하는 책이라고 생각한다. 그러나 Fee와 Stuart 같은 학자들은 예언 본문 가운데 그런 방식으로 작동하는 부분이 매우 작다는 사실을 보여 준다. 대부분의 예언 메시지는 주전 760–460년 사이의 실제 사람들, 실제 위기, 실제 언약 상황을 향해 선포되었다. 예언자들은 21세기 뉴스를 해독하기 위한 비밀 코드를 주려 한 것이 아니라, 자기 시대의 이스라엘을 하나님의 언약으로 돌아오게 하려 했다.</p><h3 class=\"section-marker\">Deep Dive</h3><p>우리는 먼저 독자들이 이 열여섯 권의 예언서에 가지고 들어오는 WHERE를 고백해야 한다. 대중적 전제는 예언자들이 본질적으로 미래를 맞히는 사람들이라는 것이다. 곧 예언서가 현대 위기를 특정 구절과 연결해 해독할 수 있는 암호화된 예측 보관소라는 생각이다. Douglas Stuart와 Grant Osborne은 모두 이것이 근본적 오독이라고 지적한다. 통계적 현실도 우리를 멈추게 한다. 구약 예언 중 직접적으로 메시아와 관련된 것은 2% 미만이고, 새 언약 시대를 다루는 것은 5% 미만이며, 우리 시대 이후의 미래 사건을 다루는 것은 1% 미만이다.</p><p>두 학자가 강조하듯 예언자의 1차 기능은 foretelling, 곧 미래 예측이 아니라 forthtelling, 곧 하나님의 말씀을 자기 시대의 동시대인에게 선포하는 것이다. 관계적 장은 시간을 초월한 수정구슬이 아니라, 주전 760–460년이라는 격동의 세기 안에 자리한 언약 관계이다. 이 시기는 Amos와 Hosea 시대의 앗수르 위협에서 바벨론 포로기와 포로 이후 재건까지 이어진다.</p><p>독자가 예언서에 들어가는 지점을 예측적 호기심에서 언약적 주의로 재조정하지 않으면, 예언서는 계속 불투명하게 남거나, 더 나쁘게는 해석자가 이미 확신하는 현대 위기에 맞춰 마음대로 휘어지는 책이 된다.</p><h3 class=\"section-marker check\">Check your understanding:</h3><ul class=\"practice-list\"><li>한 문장으로 “fore-telling”과 “forth-telling”의 차이를 설명하라.</li><li>예언 중 직접적으로 메시아적인 부분이 2% 미만이라는 사실은 왜 중요한가?</li></ul></div>"}, {"id": "m2", "nav_en": "M2", "nav_ko": "M2", "en": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M2 — The Vocation: Covenant Enforcement Mediators</h1></div>\n<div class=\"pedagogy-strip\"><span>Question</span><span>Plain Entry</span><span>Deep Dive</span><span>Practice</span><span>Formation</span></div>\n<div class=\"card module-card\">\n<p class=\"module-question\">In this module we will ask: What exactly was the prophet&#x27;s job?</p>\n<p>If the prophet is not a prognosticator, what is their WHAT? Stuart&#x27;s category, which Osborne adopts, is precise: the prophets are Covenant Enforcement Mediators — in other words, prophets were like prosecutors who reminded Israel of the covenant law and announced the results of obedience or disobedience. They do not invent new theology; they enforce existing law. They are revivalists — covenant prosecutors — commissioned to announce whether Israel has remained faithful or broken faith with the Sinai agreement, and to declare the consequences accordingly.</p>\n<p>The structural logic of this role is elegant and sobering. When Israel was heading toward destruction (roughly 760–586 BC), the dominant prophetic register was curse: Stuart&#x27;s &quot;Ten D&#x27;s&quot; — death, disease, drought, dearth, danger, destruction, defeat, deportation, destitution, and disgrace. When the destruction had occurred and the people were in exile (post-586 BC), the register shifted decisively toward blessing: life, health, prosperity, abundance, respect, and safety. The prophets did not fabricate these categories; every one of them is drawn directly from the covenantal blessings and curses already established in the Pentateuch, particularly in Leviticus 26 and Deuteronomy 28–30.</p>\n<p>The covenant itself was structured as a suzerain-vassal treaty — this is like a great king (suzerain) making a treaty with a smaller nation (vassal). God is the great king; Israel is the smaller partner. The prophets are ambassadors delivering the great king&#x27;s message, not independent visionaries constructing their own theological system. Their authority derives entirely from the covenant they enforce; their warnings are therefore not arbitrary but legally grounded in the prior word of God already given to Israel.</p>\n<h3 class=\"section-marker check\">Check your understanding:</h3>\n<ul class=\"practice-list\">\n<li>In one sentence, how would you define &quot;Covenant Enforcement Mediator&quot;?</li>\n<li>How do the &quot;Ten D&#x27;s&quot; connect back to Leviticus 26 and Deuteronomy 28–30?</li>\n</ul>\n</div>", "ko": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M2 — 소명: 언약 집행 중재자</h1></div><div class=\"pedagogy-strip\"><span>질문</span><span>직무</span><span>구조</span><span>확인</span><span>형성</span></div><div class=\"card module-card\"><p class=\"module-question\">이 모듈에서 우리는 묻는다. 예언자의 직무는 정확히 무엇이었는가?</p><p>예언자가 예언 점쟁이가 아니라면, 그들의 WHAT은 무엇인가? Stuart의 범주, 그리고 Osborne이 받아들이는 범주는 매우 정확하다. 예언자는 Covenant Enforcement Mediators, 곧 언약 집행 중재자이다. 쉽게 말하면 예언자는 이스라엘에게 언약법을 상기시키고 순종과 불순종의 결과를 선포하는 검사와 같다. 그들은 새로운 신학을 만들어 내지 않는다. 이미 주어진 법을 집행한다. 그들은 부흥사이며 언약 검사로서, 이스라엘이 시내산 언약에 충실했는지 배신했는지를 선포하고 그 결과를 선언하도록 보냄을 받았다.</p><p>이 역할의 구조 논리는 우아하면서도 엄중하다. 이스라엘이 멸망으로 향하던 시기, 대략 주전 760–586년에는 예언의 지배적 어조가 저주였다. Stuart가 말한 “Ten D’s”는 death, disease, drought, dearth, danger, destruction, defeat, deportation, destitution, disgrace이다. 멸망이 실제로 일어나고 백성이 포로가 된 이후, 즉 주전 586년 이후에는 어조가 축복으로 크게 전환된다. 생명, 건강, 번영, 풍성함, 존중, 안전이 강조된다. 예언자들은 이 범주들을 만들어 낸 것이 아니다. 이것들은 레위기 26장과 신명기 28–30장에 이미 세워진 언약의 복과 저주에서 직접 나온다.</p><p>언약 자체는 종주권-봉신 조약으로 구성되어 있다. 이는 큰 왕, 곧 종주가 작은 나라, 곧 봉신과 조약을 맺는 구조와 같다. 하나님은 큰 왕이고 이스라엘은 작은 언약 파트너이다. 예언자는 큰 왕의 메시지를 전달하는 사절이지, 독립적 환상가나 신학 체계의 창안자가 아니다. 그들의 권위는 전적으로 그들이 집행하는 언약에서 나온다. 그러므로 그들의 경고는 임의적이지 않고, 이스라엘에게 이미 주어진 하나님의 이전 말씀 안에 법적으로 근거한다.</p><h3 class=\"section-marker check\">Check your understanding:</h3><ul class=\"practice-list\"><li>한 문장으로 “Covenant Enforcement Mediator”를 정의하라.</li><li>“Ten D’s”는 레위기 26장과 신명기 28–30장과 어떻게 연결되는가?</li></ul></div>"}, {"id": "m3", "nav_en": "M3", "nav_ko": "M3", "en": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M3 — The Identity of the Prophet: Nābīʾ</h1></div>\n<div class=\"pedagogy-strip\"><span>Question</span><span>Plain Entry</span><span>Deep Dive</span><span>Practice</span><span>Formation</span></div>\n<div class=\"card module-card\">\n<p class=\"module-question\">In this module we will ask: Who is the prophet as a person — and why does that matter?</p>\n<p>Before examining the literary forms the prophets employed, it is worth pausing on their personal identity — because the WHO of the prophet is itself theologically significant. Osborne&#x27;s analysis of the Hebrew term nābīʾ (נָבִיא) reveals a constitutive twofold movement:</p>\n<p class=\"key-paragraph\">The Passive Side: The prophet is one who is filled with the Spirit and receives God&#x27;s message through supernatural revelatory experience — vision, audition, or direct address. This reception is not self-initiated; the prophets are often reluctant, even resistant, to the commission they receive.</p>\n<p class=\"key-paragraph\">The Active Side: The prophet interprets and proclaims that received message to a specific audience in a specific moment. The transition from reception to proclamation is the defining prophetic act.</p>\n<p>Together these two movements define the prophet as God&#x27;s mouthpiece rather than an independent moral philosopher. Unlike the king (whose office is hereditary) or the priest (whose role is inherited through lineage), the prophet never inherits their vocation. They are seized by divine will, often against their own inclinations, and they speak under what Osborne calls the &quot;constraint of Yahweh.&quot; The messenger formula that opens so many oracles — &quot;Thus says the Lord&quot; (כֹה אָמַר יהוָה) — reflects the precise protocol of royal emissaries in the ancient Near East: the ambassador is delivering someone else&#x27;s declaration, not their own.</p>\n<p>This identity as constrained, authorized ambassador has a direct implication for how we hear prophetic texts: the word carries the authority not of its human speaker but of the King who sent it. The prophet&#x27;s personal circumstances, temperament, or social location do not diminish or domesticate the covenantal word they carry.</p>\n<h3 class=\"section-marker check\">Check your understanding:</h3>\n<ul class=\"practice-list\">\n<li>What does the word nābīʾ tell us about the prophet&#x27;s identity?</li>\n<li>Why does it matter that the prophet &quot;never inherits&quot; their vocation?</li>\n</ul>\n</div>", "ko": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M3 — 예언자의 정체성: Nābīʾ</h1></div><div class=\"pedagogy-strip\"><span>질문</span><span>WHO</span><span>수용</span><span>선포</span><span>형성</span></div><div class=\"card module-card\"><p class=\"module-question\">이 모듈에서 우리는 묻는다. 예언자는 어떤 사람이며, 왜 그것이 중요한가?</p><p>예언자들이 사용한 문학 형식을 살피기 전에, 그들의 인격적 정체성에 잠시 머물 필요가 있다. 예언자의 WHO 자체가 신학적으로 중요하기 때문이다. Osborne이 분석한 히브리어 nābīʾ (נָבִיא)는 두 방향의 움직임을 드러낸다.</p><p class=\"key-paragraph\"><strong>수동적 측면:</strong> 예언자는 성령으로 충만해지고, 환상, 들음, 직접적 말씀과 같은 초자연적 계시 경험을 통해 하나님의 메시지를 받는 사람이다. 이 수용은 스스로 시작한 것이 아니다. 예언자들은 종종 자신이 받은 소명에 주저하고 저항한다.</p><p class=\"key-paragraph\"><strong>능동적 측면:</strong> 예언자는 받은 메시지를 특정 청중과 특정 순간에 해석하고 선포한다. 수용에서 선포로 넘어가는 것이 예언자적 행위의 핵심이다.</p><p>이 두 움직임은 예언자를 독립적 도덕 철학자가 아니라 하나님의 입으로 규정한다. 왕의 직분은 세습되고 제사장의 역할은 혈통을 통해 상속되지만, 예언자는 자기 소명을 물려받지 않는다. 그는 하나님의 뜻에 붙잡힌다. 때로는 자기 의지와 반대로 붙잡힌다. Osborne의 표현처럼 그는 “야훼의 강제” 아래에서 말한다. 많은 신탁을 여는 메신저 공식, “여호와께서 이와 같이 말씀하신다”는 고대 근동 왕실 사절의 정확한 프로토콜을 반영한다. 사절은 자기 선언이 아니라 보낸 분의 선언을 전달한다.</p><p>이처럼 강제되고 위임받은 사절이라는 정체성은 우리가 예언 본문을 듣는 방식에 직접적인 함의를 준다. 그 말씀은 인간 화자의 권위가 아니라 그를 보내신 왕의 권위를 가진다. 예언자의 개인 사정, 성격, 사회적 위치는 그가 운반하는 언약의 말씀을 약화시키거나 길들이지 않는다.</p><h3 class=\"section-marker check\">Check your understanding:</h3><ul class=\"practice-list\"><li>nābīʾ라는 단어는 예언자의 정체성에 대해 무엇을 말해 주는가?</li><li>예언자가 자기 소명을 “상속하지 않는다”는 사실은 왜 중요한가?</li></ul></div>"}, {"id": "m4", "nav_en": "M4", "nav_ko": "M4", "en": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M4 — The Forms of the Oracle: Thinking in Genres</h1></div>\n<div class=\"pedagogy-strip\"><span>Question</span><span>Plain Entry</span><span>Deep Dive</span><span>Practice</span><span>Formation</span></div>\n<div class=\"card module-card\">\n<p class=\"module-question\">In this module we will learn to recognize the five main forms a prophetic oracle takes.</p>\n<p>The exegetical task requires learning to think in oracles. Most prophetic books are not flowing prose compositions but collections of discrete spoken units, often in poetic form, frequently assembled without clear editorial divisions. Identifying the specific literary subgenre of each oracle is not an academic exercise; it determines the rhetorical posture of the text and the kind of response it demands.</p>\n<p>Stuart and Osborne together identify five primary forms:</p>\n<p>1. The Judgment Speech (Gerichtswort): The foundational form. It consists of a messenger formula (&quot;Thus says the Lord&quot;), an accusation naming the specific covenantal violation, and a prediction of the disaster that will follow.</p>\n<p>Worked Example — Amos 2:6–8:</p>\n<p>2. The Woe Oracle: Opens with hôy (&quot;woe&quot;), a term drawn directly from the vocabulary of funeral lament.</p>\n<p>Example: &quot;Woe to those who add house to house and join field to field, until no place is left and you live alone in the land!&quot; (Isaiah 5:8). The word &quot;woe&quot; is like a funeral cry — the prophet is not simply angry; he is grieving because Israel has already as good as died in its covenant unfaithfulness. By using this word, the prophet performs mourning before the judgment fully arrives.</p>\n<p>3. The Lawsuit (Rîb): A formal legal summons to the divine law court, in which God calls witnesses, establishes Israel&#x27;s guilt, and pronounces judgment. In many instances heaven and earth are summoned as witnesses — the same cosmic witnesses who were present at Sinai when the covenant was enacted. The rîb form makes explicit what all prophetic speech presupposes: the covenant is a binding legal agreement, and its violation has consequences.</p>\n<p>4. The Promise Oracle: A salvation oracle that announces radical future transformation and blessing. Promise oracles predominate in the post-exilic period, when the primary pastoral need is not further warning but the re-energizing of a devastated community.</p>\n<p>5. Symbolic Actions (Enactment Prophecies): Acted parables in which the prophet embodies the message physically — as when Isaiah walked stripped and barefoot for three years (Isaiah 20), or Jeremiah smashed a clay jar before the elders of Jerusalem (Jeremiah 19). These are not theatrical performances but covenantally potent speech acts: the action is itself a form of proclamation.</p>\n<p class=\"formation-note\">Formation Note: Once readers learn to identify these five forms, the prophetic books cease to be a uniform monotone of divine complaint. Each oracle has its own rhetorical posture, its own emotional register, and its own implied demand upon the hearer.</p>\n<h3 class=\"section-marker try\">🔎 Try It</h3>\n<p>Practice: Choose one short prophetic passage (5–8 verses). Ask:</p>\n<ul class=\"practice-list\">\n<li>Is this judgment, woe, lawsuit, promise, or symbolic action?</li>\n<li>What clues in the text help you decide?</li>\n<li>If it is a judgment speech, can you find the three parts: messenger formula, accusation, announcement?</li>\n</ul>\n<h3 class=\"section-marker check\">Check your understanding:</h3>\n<ul class=\"practice-list\">\n<li>What are the three parts of a Judgment Speech?</li>\n<li>Why does the prophet use a &quot;funeral word&quot; (hôy) before the judgment has actually arrived?</li>\n</ul>\n</div>", "ko": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M4 — 신탁의 형식: 장르로 생각하기</h1></div><div class=\"pedagogy-strip\"><span>질문</span><span>장르</span><span>다섯 형식</span><span>Try It</span><span>형성</span></div><div class=\"card module-card\"><p class=\"module-question\">이 모듈에서 우리는 예언 신탁이 취하는 다섯 가지 주요 형식을 인식하는 법을 배운다.</p><p>주해적 과제는 신탁 단위로 생각하는 법을 배우는 것이다. 대부분의 예언서는 흐르는 산문 구성이 아니라, 분리된 구두 메시지들의 모음이다. 그 메시지들은 대개 시적 형식이며, 때로는 분명한 편집 구분 없이 모여 있다. 각 신탁의 구체적 하위 장르를 식별하는 일은 단순한 학문적 연습이 아니다. 그것은 본문의 수사적 자세와 독자가 요구받는 응답의 종류를 결정한다.</p><p>Stuart와 Osborne은 함께 다섯 가지 주요 형식을 제시한다.</p><p><strong>1. 심판 연설, Gerichtswort:</strong> 가장 기본적인 형식이다. 메신저 공식, 곧 “여호와께서 이와 같이 말씀하신다”로 시작하고, 구체적 언약 위반을 지적하는 고발과, 뒤따를 재앙의 선포로 구성된다. 예: Amos 2:6–8.</p><p><strong>2. 화 신탁, Woe Oracle:</strong> hôy, “화 있을진저”로 시작한다. 이 단어는 장례 애가의 어휘에서 직접 나온다. 예: “가옥에 가옥을 이으며 전토에 전토를 더하여 빈틈이 없도록 하고 이 땅 가운데서 홀로 살려 하는 자들은 화 있을진저”(Isaiah 5:8). “화”는 장례의 외침과 같다. 예언자는 단순히 분노하는 것이 아니라, 이스라엘이 언약 불신실 안에서 이미 죽은 것과 같기 때문에 애도한다.</p><p><strong>3. 소송, Rîb:</strong> 공식적 법정 소환이다. 하나님은 증인을 부르시고, 이스라엘의 죄를 확정하시며, 심판을 선고하신다. 많은 경우 하늘과 땅이 증인으로 소환된다. 그들은 시내산 언약이 체결될 때도 있었던 우주적 증인이다. rîb 형식은 모든 예언 말씀이 전제하는 것을 분명하게 만든다. 언약은 구속력 있는 법적 합의이며, 그 위반에는 결과가 따른다.</p><p><strong>4. 약속 신탁:</strong> 미래의 급진적 변화와 복을 선포하는 구원 신탁이다. 포로기 이후에는 더 이상의 경고보다 황폐해진 공동체를 다시 일으키는 목회적 필요가 컸기 때문에 약속 신탁이 두드러진다.</p><p><strong>5. 상징 행위, Enactment Prophecies:</strong> 예언자가 메시지를 몸으로 구현하는 행동 비유이다. Isaiah가 3년 동안 벗은 몸과 맨발로 걸은 일(Isaiah 20), Jeremiah가 예루살렘 장로들 앞에서 옹기를 깨뜨린 일(Jeremiah 19)이 이에 해당한다. 이것은 연극이 아니라 언약적으로 효력 있는 발화 행위이다. 행동 자체가 선포이다.</p><p class=\"formation-note\"><strong>Formation Note:</strong> 독자가 이 다섯 형식을 식별하는 법을 배우면, 예언서는 더 이상 하나님의 불평이 반복되는 단조로운 책이 아니다. 각 신탁은 고유한 수사적 자세, 감정의 음색, 그리고 청중에게 요구하는 반응을 가진다.</p><h3 class=\"section-marker try\">🔎 Try It</h3><ul class=\"practice-list\"><li>짧은 예언 본문 5–8절을 하나 선택하라.</li><li>그 본문은 심판, 화, 소송, 약속, 상징 행위 중 무엇인가?</li><li>본문 안의 어떤 단서가 그렇게 판단하게 하는가?</li><li>심판 연설이라면 세 부분, 곧 메신저 공식, 고발, 선포를 찾을 수 있는가?</li></ul><h3 class=\"section-marker check\">Check your understanding:</h3><ul class=\"practice-list\"><li>심판 연설의 세 부분은 무엇인가?</li><li>왜 예언자는 심판이 아직 완전히 오기 전에 장례 단어 hôy를 사용하는가?</li></ul></div>"}, {"id": "m5", "nav_en": "M5", "nav_ko": "M5", "en": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M5 — The Exegetical Task: Grounding Oracles in History</h1></div>\n<div class=\"pedagogy-strip\"><span>Question</span><span>Plain Entry</span><span>Deep Dive</span><span>Practice</span><span>Formation</span></div>\n<div class=\"card module-card\">\n<p class=\"module-question\">In this module we will ask: How do we find the historical situation behind a prophetic oracle?</p>\n<p>The WHERE of most prophetic oracles is confined to a narrow and turbulent historical band. Understanding any given oracle requires two levels of contextual reconstruction that Fee and Stuart call the Larger Context and the Specific Context.</p>\n<p class=\"key-paragraph\">Larger Context: The historical era as a whole — the political, military, and religious landscape of the Assyrian or Babylonian period. Without understanding that Amos is writing when Israel is experiencing a false prosperity under Jeroboam II, or that Isaiah is addressing the shadow of Assyrian expansion under Tiglath-Pileser III, the force of the oracles is muffled.</p>\n<p class=\"key-paragraph\">Specific Context: The precise date, audience, and situational trigger of an individual oracle. Hosea 5:8–12, for example, is a war oracle generated by the Syro-Ephraimite invasion of 734 BC. Without that anchor, the passage remains opaque. With it, the covenantal logic — why this curse, for whom, in response to which specific failure — becomes transparent.</p>\n<p>Osborne adds an additional complication that demands careful handling: the telescoping of prophetic time. Prophetic speech frequently compresses distinct historical moments into a single utterance — drawing the immediate crisis, the Babylonian exile, and the ultimate eschatological horizon into a continuous prophetic vision without marking the transitions.</p>\n<p>Example: Isaiah 9:1–7 blends the near situation (relief from Assyrian threat) with the far horizon (a coming king of peace) in a single poetic vision. The prophet does not separate the &quot;near&quot; and &quot;far&quot; with a chapter break; both are held in one picture. This is why careful exegesis always asks: Which horizon is dominant here — and has the New Testament identified a further level of meaning?</p>\n<p>The New Testament writers, themselves inspired, sometimes identify a &quot;fuller meaning&quot; (sensus plenior — this means a &quot;fuller meaning&quot; that God built into the text, which the New Testament writers sometimes reveal under the Spirit&#x27;s guidance) in such texts — as when Matthew applies Hosea 11:1 (&quot;Out of Egypt I called my son&quot;) to Jesus&#x27; return from Egypt.</p>\n<p>The critical point for the contemporary reader is this: we are illumined readers, not inspired writers. We are not authorized to generate new sensus plenior independently; we can perceive such fulfillments only after the New Testament has identified them. Our primary exegetical task remains the rigorous reconstruction of the original meaning before we allow ourselves the hermeneutical move toward contemporary application.</p>\n<h3 class=\"section-marker check\">Check your understanding:</h3>\n<ul class=\"practice-list\">\n<li>What is the difference between &quot;Larger Context&quot; and &quot;Specific Context&quot;?</li>\n<li>What does &quot;telescoping of prophetic time&quot; mean in your own words?</li>\n</ul>\n</div>", "ko": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M5 — 주해 과제: 신탁을 역사에 뿌리내리기</h1></div><div class=\"pedagogy-strip\"><span>질문</span><span>WHERE</span><span>역사</span><span>시간의 망원</span><span>형성</span></div><div class=\"card module-card\"><p class=\"module-question\">이 모듈에서 우리는 묻는다. 예언 신탁 뒤에 있는 역사적 상황을 어떻게 찾는가?</p><p>대부분의 예언 신탁의 WHERE는 좁고 격동적인 역사적 대역 안에 놓인다. 어떤 신탁을 이해하려면 Fee와 Stuart가 말하는 두 수준의 문맥 재구성이 필요하다. 그것은 Larger Context와 Specific Context이다.</p><p class=\"key-paragraph\"><strong>Larger Context:</strong> 전체 역사 시대, 곧 앗수르나 바벨론 시대의 정치적, 군사적, 종교적 환경이다. Amos가 Jeroboam II 시대의 거짓 번영 속에서 말하고 있다는 사실, Isaiah가 Tiglath-Pileser III 아래 앗수르 팽창의 그림자를 향해 말하고 있다는 사실을 모르면 신탁의 힘은 약해진다.</p><p class=\"key-paragraph\"><strong>Specific Context:</strong> 개별 신탁의 정확한 날짜, 청중, 상황적 촉발 요인이다. 예를 들어 Hosea 5:8–12는 주전 734년 Syro-Ephraimite 침공에서 발생한 전쟁 신탁이다. 그 앵커가 없으면 본문은 불투명하게 남는다. 그것이 있으면 왜 이 저주가, 누구에게, 어떤 특정 실패에 대한 응답으로 선포되는지가 투명해진다.</p><p>Osborne은 여기에 조심스럽게 다루어야 할 또 하나의 복잡성을 추가한다. 그것은 예언 시간의 망원적 압축, 곧 telescoping of prophetic time이다. 예언은 종종 서로 다른 역사적 순간들을 하나의 발화 안에 압축한다. 즉각적 위기, 바벨론 포로, 궁극적 종말론적 지평이 명확한 전환 표시 없이 하나의 예언적 비전 안에 함께 들어간다.</p><p>예: Isaiah 9:1–7은 가까운 상황, 곧 앗수르 위협으로부터의 구원과 먼 지평, 곧 평화의 왕의 도래를 하나의 시적 비전 안에 섞는다. 예언자는 “가까움”과 “멀어짐”을 장 절로 분리하지 않는다. 둘 다 하나의 그림 안에 보존된다. 그러므로 신중한 주해는 항상 묻는다. 여기서 지배적인 지평은 무엇인가? 그리고 신약이 더 깊은 의미를 식별했는가?</p><p>신약 저자들은 성령의 영감 아래 때로 이런 본문들에서 sensus plenior, 곧 “더 충만한 의미”를 식별한다. 예를 들어 Matthew는 Hosea 11:1 “내 아들을 애굽에서 불렀다”를 예수의 애굽 귀환에 적용한다. 그러나 현대 독자에게 중요한 점은 이것이다. 우리는 조명받은 독자이지 영감받은 저자가 아니다. 우리는 새로운 sensus plenior를 독립적으로 만들어 낼 권한이 없다. 신약이 그것을 식별한 후에야 그 성취를 인식할 수 있다. 우리의 1차 주해 과제는 오늘의 적용으로 이동하기 전에 원래 의미를 엄밀히 재구성하는 것이다.</p><h3 class=\"section-marker check\">Check your understanding:</h3><ul class=\"practice-list\"><li>“Larger Context”와 “Specific Context”의 차이는 무엇인가?</li><li>“telescoping of prophetic time”을 자신의 말로 설명하라.</li></ul></div>"}, {"id": "m6", "nav_en": "M6", "nav_ko": "M6", "en": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M6 — The Hermeneutical Spiral: From Exegesis to Significance</h1></div>\n<div class=\"pedagogy-strip\"><span>Question</span><span>Plain Entry</span><span>Deep Dive</span><span>Practice</span><span>Formation</span></div>\n<div class=\"card module-card\">\n<p class=\"module-question\">In this module we will ask: How do we move responsibly from &quot;what it meant then&quot; to &quot;what it means now&quot;?</p>\n<h3 class=\"section-marker plain\">📖 Everyday Picture First</h3>\n<p>You can think of the hermeneutical spiral like learning a song by ear. First, you listen carefully to the original recording (exegesis: &quot;what it meant then&quot;). Then you sing or play it yourself in your own style and context (application: &quot;what it means now&quot;). You do not change the melody, but each time you listen and play again, you understand it more deeply.</p>\n<p>In this class, we practice the spiral on three levels:</p>\n<p>Exegesis: What did this text mean for the first hearers?</p>\n<p>Devotion: How does this text speak to my own life with God?</p>\n<p>Proclamation: How might I share this word with others?</p>\n<h3 class=\"section-marker\">Deep Dive</h3>\n<p>Fee and Stuart&#x27;s account of biblical interpretation and Osborne&#x27;s Hermeneutical Spiral share a common conviction: the movement from text to application is not a simple transfer but a disciplined, iterative spiral. Understanding how this spiral works is essential before attempting to apply any prophetic text to a contemporary situation.</p>\n<p>The fundamental need for interpretation arises from the dual nature of Scripture itself. The Bible is, as Fee writes, &quot;the Word of God given in human words in history.&quot; This creates a permanent and productive tension between two realities:</p>\n<p class=\"key-paragraph\">Eternal Relevance: Because it is God&#x27;s word, Scripture speaks to all people in every culture and age.</p>\n<p class=\"key-paragraph\">Historical Particularity: Because God spoke through specific human words in specific historical moments, every book is conditioned by the language, culture, and circumstances of its origin.</p>\n<p>Interpretation is the necessary navigation of this tension. Osborne conceptualizes the task as a spiral — not a closed hermeneutical circle that merely confirms what the reader already believes, but an open-ended, iterative movement that narrows progressively toward the text&#x27;s intended meaning and then widens again toward contemporary significance.</p>\n<p>The spiral operates on three levels of interpretive engagement: the third-person task of exegesis (&quot;what it meant&quot; in the original setting), the first-person task of devotional appropriation (&quot;what it means for me&quot;), and the second-person task of proclamation (&quot;how to share it with you&quot;). All three are necessary; the error lies in skipping the first and building the second and third on unsupported subjective impressions.</p>\n<h3 class=\"section-marker check\">Check your understanding:</h3>\n<p>In your own words, describe what a &quot;spiral&quot; (rather than a straight line) means for interpretation.</p>\n<ul class=\"practice-list\">\n<li>Why is it dangerous to skip exegesis and jump straight to application?</li>\n</ul>\n</div>", "ko": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M6 — 해석학적 나선: 주해에서 의미로</h1></div><div class=\"pedagogy-strip\"><span>질문</span><span>비유</span><span>세 수준</span><span>심화</span><span>형성</span></div><div class=\"card module-card\"><p class=\"module-question\">이 모듈에서 우리는 묻는다. “그때의 의미”에서 “지금의 의미”로 어떻게 책임 있게 이동하는가?</p><h3 class=\"section-marker plain\">📖 Everyday Picture First</h3><p>해석학적 나선은 귀로 노래를 배우는 것과 비슷하다. 먼저 원곡을 주의 깊게 듣는다. 이것이 주해, 곧 “그때의 의미”이다. 그 다음 자신의 맥락과 방식으로 그 노래를 부르거나 연주한다. 이것이 적용, 곧 “지금의 의미”이다. 멜로디를 바꾸지는 않지만, 듣고 다시 연주할수록 더 깊이 이해하게 된다.</p><p>이 수업에서 우리는 나선을 세 수준에서 연습한다.</p><ul class=\"practice-list\"><li><strong>Exegesis:</strong> 이 본문은 첫 청중에게 무엇을 의미했는가?</li><li><strong>Devotion:</strong> 이 본문은 나의 하나님과의 삶에 어떻게 말하는가?</li><li><strong>Proclamation:</strong> 이 말씀을 다른 사람에게 어떻게 나눌 수 있는가?</li></ul><h3 class=\"section-marker\">Deep Dive</h3><p>Fee와 Stuart의 성경해석 설명과 Osborne의 Hermeneutical Spiral은 공통된 확신을 공유한다. 본문에서 적용으로의 이동은 단순한 이전이 아니라 훈련된 반복적 나선이다. 이 나선이 어떻게 작동하는지를 이해하는 것은 어떤 예언 본문을 오늘에 적용하기 전에 필수적이다.</p><p>해석이 필요한 근본 이유는 성경 자체의 이중 성격에서 나온다. Fee의 표현처럼 성경은 “역사 안에서 인간의 말로 주어진 하나님의 말씀”이다. 이것은 두 현실 사이의 영구적이고 생산적인 긴장을 만든다.</p><p class=\"key-paragraph\"><strong>Eternal Relevance:</strong> 성경은 하나님의 말씀이기 때문에 모든 문화와 시대의 모든 사람에게 말한다.</p><p class=\"key-paragraph\"><strong>Historical Particularity:</strong> 하나님은 특정한 역사적 순간의 특정한 인간 언어를 통해 말씀하셨기 때문에, 각 책은 그 기원 언어, 문화, 상황에 의해 형성되어 있다.</p><p>해석은 이 긴장을 항해하는 필수적 작업이다. Osborne은 이 과제를 나선으로 개념화한다. 이것은 독자가 이미 믿는 것을 확인하는 닫힌 해석학적 원이 아니라, 본문의 의도된 의미를 향해 점진적으로 좁혀 가고 다시 오늘의 중요성을 향해 넓어지는 열린 반복 운동이다.</p><p>나선은 세 수준의 해석적 참여에서 작동한다. 원래 상황에서 “무엇을 의미했는가”를 묻는 3인칭 주해, “나에게 무엇을 의미하는가”를 묻는 1인칭 묵상적 수용, 그리고 “너에게 어떻게 나눌 것인가”를 묻는 2인칭 선포이다. 세 가지가 모두 필요하다. 오류는 첫 번째를 건너뛰고 두 번째와 세 번째를 근거 없는 주관적 인상 위에 세울 때 발생한다.</p><h3 class=\"section-marker check\">Check your understanding:</h3><ul class=\"practice-list\"><li>해석이 직선이 아니라 “나선”이라는 말은 무엇을 의미하는가?</li><li>주해를 건너뛰고 곧바로 적용으로 가는 것이 왜 위험한가?</li></ul></div>"}, {"id": "m7", "nav_en": "M7", "nav_ko": "M7", "en": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M7 — The Two Tasks: Exegesis and Hermeneutics</h1></div>\n<div class=\"pedagogy-strip\"><span>Question</span><span>Plain Entry</span><span>Deep Dive</span><span>Practice</span><span>Formation</span></div>\n<div class=\"card module-card\">\n<p class=\"module-question\">In this module we will learn the two basic rules that guide every act of interpretation.</p>\n<h3 class=\"section-marker mini\">📋 Mini Checklist: Two Rules We Use on Every Passage</h3>\n<p>Two basic rules (Fee):</p>\n<ul class=\"practice-list\">\n<li>A text cannot mean what it could never have meant for the original readers.</li>\n<li>When our situation is truly similar to theirs, God&#x27;s word to them still speaks in the same way to us.</li>\n</ul>\n<p>Two sets of questions to guide exegesis:</p>\n<p>Context questions — Ask these first:</p>\n<ul class=\"practice-list\">\n<li>Who is writing? To whom? When? What is happening?</li>\n<li>How does this paragraph fit in the whole book?</li>\n</ul>\n<p>Content questions — Ask these second:</p>\n<ul class=\"practice-list\">\n<li>What do key words mean here (not just in general)?</li>\n<li>Are there repeated ideas or images?</li>\n<li>How do the sentences connect to each other?</li>\n</ul>\n<h3 class=\"section-marker\">Deep Dive</h3>\n<p>Fee defines exegesis as &quot;the careful, systematic study of the Scripture to discover the original, intended meaning.&quot; It is primarily a historical task: the attempt to hear the word as the original recipients heard it. Two categories of questions drive good exegesis:</p>\n<p class=\"key-paragraph\">Contextual Questions: Historical context (the time, culture, occasion, and occasion of writing) and literary context (the structure of the argument, the function of the passage within the larger whole). The crucial literary question is always: &quot;What is the point of this unit?&quot; Fee insists that readers must learn to think in paragraphs rather than verses — tracing the author&#x27;s train of thought through coherent units of logic rather than extracting isolated statements.</p>\n<p class=\"key-paragraph\">Content Questions: The meaning of specific words in their original semantic range, the function of grammatical constructions, and the reconstruction of the textual tradition where variants exist.</p>\n<p>Fee&#x27;s Basic Rule of Hermeneutics then governs the move from exegesis to application: &quot;a text cannot mean what it could never have meant for its original readers.&quot; This rule is not a restriction on the text&#x27;s power; it is a protection against the imposition of foreign meanings that distort rather than disclose the original word.</p>\n<p>A Second Rule provides the bridge: whenever contemporary readers share comparable particulars with the original audience — similar life situations, analogous covenantal dynamics — God&#x27;s word to them carries the same weight to us. Where the particulars are non-comparable (situations unique to the first century), the interpreter must identify the underlying theological principle that transcends the cultural specifics before making the application.</p>\n<h3 class=\"section-marker check\">Check your understanding:</h3>\n<ul class=\"practice-list\">\n<li>Why does Fee say we must &quot;think in paragraphs rather than verses&quot;?</li>\n</ul>\n<p>Give one example of a situation where our context is &quot;truly similar&quot; to the original audience&#x27;s.</p>\n</div>", "ko": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M7 — 두 과제: 주해와 해석학</h1></div><div class=\"pedagogy-strip\"><span>질문</span><span>규칙</span><span>문맥</span><span>내용</span><span>브리지</span></div><div class=\"card module-card\"><p class=\"module-question\">이 모듈에서 우리는 모든 해석 행위를 인도하는 두 기본 규칙을 배운다.</p><h3 class=\"section-marker mini\">📋 Mini Checklist: 모든 본문에 사용하는 두 규칙</h3><p><strong>Fee의 두 기본 규칙:</strong></p><ul class=\"practice-list\"><li>본문은 원래 독자들에게 결코 의미할 수 없었던 것을 오늘 의미할 수 없다.</li><li>우리의 상황이 그들의 상황과 참으로 유사할 때, 그들에게 주어진 하나님의 말씀은 같은 방식으로 우리에게도 말한다.</li></ul><p><strong>주해를 인도하는 두 질문 묶음:</strong></p><p><strong>Context questions — 먼저 물어야 할 질문:</strong></p><ul class=\"practice-list\"><li>누가 쓰는가? 누구에게 쓰는가? 언제인가? 무슨 일이 일어나고 있는가?</li><li>이 단락은 책 전체 안에서 어떻게 기능하는가?</li></ul><p><strong>Content questions — 다음에 물어야 할 질문:</strong></p><ul class=\"practice-list\"><li>핵심 단어들은 여기서 무엇을 의미하는가? 일반적 의미가 아니라 이 문맥의 의미는 무엇인가?</li><li>반복되는 생각이나 이미지가 있는가?</li><li>문장들은 서로 어떻게 연결되는가?</li></ul><h3 class=\"section-marker\">Deep Dive</h3><p>Fee는 주해를 “성경의 원래 의도된 의미를 발견하기 위한 신중하고 체계적인 연구”라고 정의한다. 주해는 일차적으로 역사적 과제이다. 즉 원래 수신자들이 들었던 방식으로 말씀을 들으려는 시도이다. 좋은 주해는 두 범주의 질문에 의해 움직인다.</p><p class=\"key-paragraph\"><strong>Contextual Questions:</strong> 역사적 문맥, 곧 시간, 문화, 저작 상황과 문학적 문맥, 곧 논증 구조와 큰 전체 안에서 본문의 기능을 묻는다. 핵심 문학 질문은 언제나 “이 단위의 요점은 무엇인가?”이다. Fee는 독자가 절 단위가 아니라 단락 단위로 생각하는 법을 배워야 한다고 강조한다. 이는 고립된 문장을 뽑아내는 것이 아니라, 논리의 coherent unit을 따라 저자의 생각의 흐름을 추적하는 것이다.</p><p class=\"key-paragraph\"><strong>Content Questions:</strong> 특정 단어가 원래 의미 범위 안에서 무엇을 뜻하는지, 문법 구조가 어떻게 작동하는지, 그리고 본문 전통의 이문이 있을 경우 그것을 어떻게 재구성할지를 묻는다.</p><p>Fee의 해석학 기본 규칙은 주해에서 적용으로 넘어가는 움직임을 통제한다. “본문은 원래 독자들에게 결코 의미할 수 없었던 것을 오늘 의미할 수 없다.” 이 규칙은 본문의 능력을 제한하는 것이 아니라, 원래 말씀을 왜곡하는 외부 의미의 주입을 막는 보호 장치이다.</p><p>두 번째 규칙은 다리를 제공한다. 현대 독자가 원래 청중과 비교 가능한 구체적 상황, 유사한 삶의 상황, 유비적 언약 역학을 공유할 때, 그들에게 주어진 하나님의 말씀은 우리에게도 같은 무게를 가진다. 구체적 상황이 비교 불가능할 때, 해석자는 적용하기 전에 문화적 특수성을 넘어서는 신학적 원리를 식별해야 한다.</p><h3 class=\"section-marker check\">Check your understanding:</h3><ul class=\"practice-list\"><li>Fee가 “절”이 아니라 “단락”으로 생각해야 한다고 말하는 이유는 무엇인가?</li><li>우리의 문맥이 원래 청중의 문맥과 “참으로 유사한” 경우의 예를 하나 들어 보라.</li></ul></div>"}, {"id": "m8", "nav_en": "M8", "nav_ko": "M8", "en": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M8 — Genre-Specific Principles and the Prophetic Context</h1></div>\n<div class=\"pedagogy-strip\"><span>Question</span><span>Plain Entry</span><span>Deep Dive</span><span>Practice</span><span>Formation</span></div>\n<div class=\"card module-card\">\n<p class=\"module-question\">In this module we will ask: What special reading rules apply specifically to prophetic texts?</p>\n<p>Both Fee and Osborne insist that the prophetic books cannot be read by the same rules that govern Pauline epistles or wisdom literature. Genre is not a decorative category; it provides the &quot;rules of the language game&quot; within which meaning is constituted. Flattening the prophetic texts into a single uniform register — as if every verse were a direct command or a direct prediction — produces systematic misreading.</p>\n<p>For the Prophets specifically, this means attending carefully to the following genre dynamics:</p>\n<p class=\"key-paragraph\">Poetic Parallelism: Most oracles are composed in Hebrew poetry. The second line of a couplet typically does not merely repeat the first but adds nuance, development, or intensification. Reading prophetic poetry requires attending to this movement between lines, not collapsing the couplet into a single flat statement.</p>\n<p class=\"key-paragraph\">Occasional Address: Like Paul&#x27;s letters, prophetic oracles arise from specific occasions. The interpreter must reconstruct &quot;the other end of the conversation&quot; — the historical crisis the prophet is addressing — before determining what the oracle means and how it might apply.</p>\n<p class=\"key-paragraph\">Typological Resonance: The prophets frequently speak in patterns that resonate across multiple historical moments. Identifying a pattern as typological does not license arbitrary modern application; it requires demonstrating structural analogy between the original situation and the contemporary one, governed by the same covenantal logic.</p>\n<p class=\"key-paragraph\">Intertextual Grounding: Prophetic imagery is saturated with Pentateuchal allusion. The curses, the blessings, the imagery of exile and return — all of it presupposes Torah fluency. Reading the prophets well requires reading them against the law they enforce.</p>\n<h3 class=\"section-marker check\">Check your understanding:</h3>\n<ul class=\"practice-list\">\n<li>What does it mean that prophetic books are &quot;occasional&quot;?</li>\n<li>Why can&#x27;t we read prophecy with the same rules as a Pauline letter?</li>\n</ul>\n</div>", "ko": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M8 — 장르별 원리와 예언적 문맥</h1></div><div class=\"pedagogy-strip\"><span>질문</span><span>장르</span><span>시</span><span>상황</span><span>상호본문</span></div><div class=\"card module-card\"><p class=\"module-question\">이 모듈에서 우리는 묻는다. 예언 본문에는 어떤 특별한 읽기 규칙이 적용되는가?</p><p>Fee와 Osborne은 예언서를 Pauline epistles나 지혜문학과 같은 규칙으로 읽을 수 없다고 강조한다. 장르는 장식적 범주가 아니다. 장르는 의미가 형성되는 “언어 게임의 규칙”을 제공한다. 예언 본문을 하나의 균일한 어조로 평면화하여 모든 구절을 직접 명령이나 직접 예측처럼 읽으면 체계적 오독이 발생한다.</p><p>예언서에 대해서는 특히 다음 장르 역학에 주의해야 한다.</p><p class=\"key-paragraph\"><strong>Poetic Parallelism:</strong> 대부분의 신탁은 히브리 시로 구성되어 있다. 평행구의 두 번째 행은 첫 번째 행을 단순 반복하지 않고, 미묘한 차이, 발전, 강화 효과를 더한다. 예언 시를 읽을 때는 두 행 사이의 움직임을 보아야지, 평행구를 하나의 납작한 진술로 무너뜨려서는 안 된다.</p><p class=\"key-paragraph\"><strong>Occasional Address:</strong> 바울 서신처럼 예언 신탁도 특정 상황에서 발생한다. 해석자는 신탁이 다루는 역사적 위기, 곧 “대화의 반대편”을 재구성해야 그 신탁이 무엇을 의미하고 어떻게 적용될 수 있는지 판단할 수 있다.</p><p class=\"key-paragraph\"><strong>Typological Resonance:</strong> 예언자들은 여러 역사적 순간에 공명하는 패턴으로 말하는 경우가 많다. 어떤 패턴을 typological하다고 식별하는 것은 임의적 현대 적용을 허락하지 않는다. 원래 상황과 현대 상황 사이에 같은 언약 논리에 의해 지배되는 구조적 유비가 있음을 보여 주어야 한다.</p><p class=\"key-paragraph\"><strong>Intertextual Grounding:</strong> 예언적 이미지는 오경적 암시로 포화되어 있다. 저주와 복, 포로와 귀환의 이미지는 모두 토라의 유창한 이해를 전제한다. 예언서를 잘 읽으려면 예언자들이 집행하는 그 법을 배경으로 읽어야 한다.</p><h3 class=\"section-marker check\">Check your understanding:</h3><ul class=\"practice-list\"><li>예언서가 “occasional”하다는 말은 무엇을 의미하는가?</li><li>왜 예언서를 바울 서신과 같은 규칙으로 읽을 수 없는가?</li></ul></div>"}, {"id": "m9", "nav_en": "M9", "nav_ko": "M9", "en": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M9 — Integration: From Illumined Reading to Orthopraxy</h1></div>\n<div class=\"pedagogy-strip\"><span>Question</span><span>Plain Entry</span><span>Deep Dive</span><span>Practice</span><span>Formation</span></div>\n<div class=\"card module-card\">\n<p class=\"module-question\">In this module we arrive at the formation destination: not just knowing the method, but living it.</p>\n<p>We arrive at the formation destination of this lecture: the WHAT that the prophetic texts press upon their contemporary readers. The goal is neither historical curiosity nor predictive fascination. It is orthopraxy — correct living in covenantal response to a God who has proven, through the entire prophetic tradition, that He is determined to enforce His covenant in every age.</p>\n<p>Osborne&#x27;s synthesis is worth stating plainly: the prophets&#x27; condemnation of social injustice, economic exploitation, empty religious performance, and covenantal unfaithfulness is as urgent now as it was in the eighth century. The structural conditions have changed; the covenantal logic has not. Where communities exploit the poor, perform worship while ignoring justice, or seek military and political security while abandoning covenant faithfulness, the prophetic word carries its original force.</p>\n<p>The contemporary reader&#x27;s identity has been reframed through this study: from fortune-teller hunter to illumined participant; from predictive decoder to covenant-formed practitioner. The illumined reader is not authorized to manufacture new sensus plenior, but they are authorized — and obligated — to identify where the same covenantal dynamics are operative in their own moment and to call themselves and their communities back to the same faithfulness the prophets demanded.</p>\n<p class=\"formation-note\">Closing Formation Question: What specific covenantal breach in your own community — in the domains of economic justice, religious performance, or political allegiance — would the eighth-century prophets name first if they were standing among you today? What would their messenger formula sound like directed at your specific WHERE?</p>\n<h3 class=\"section-marker check\">Check your understanding:</h3>\n<ul class=\"practice-list\">\n<li>What is the difference between &quot;orthodoxy&quot; and &quot;orthopraxy&quot;?</li>\n<li>In one sentence, describe the movement this lecture calls you to make — from what kind of reader to what kind of reader?</li>\n</ul>\n</div>", "ko": "<div class=\"hero\"><div class=\"course\">BH Week 13 · Full Pedagogy Module</div><h1>M9 — 통합: 조명받은 읽기에서 Orthopraxy로</h1></div><div class=\"pedagogy-strip\"><span>질문</span><span>목적</span><span>오늘</span><span>정체성</span><span>형성</span></div><div class=\"card module-card\"><p class=\"module-question\">이 모듈에서 우리는 형성의 목적지에 도착한다. 방법을 아는 것만이 아니라 그것을 살아 내는 것이다.</p><p>우리는 이 강의의 형성 목적지, 곧 예언 본문이 오늘 독자에게 요구하는 WHAT에 도착한다. 목표는 역사적 호기심이나 예측적 매혹이 아니다. 목표는 orthopraxy, 곧 언약에 응답하는 바른 삶이다. 예언 전통 전체를 통해 하나님은 모든 시대에 자기 언약을 집행하시는 분으로 드러난다.</p><p>Osborne의 종합은 분명하게 말할 가치가 있다. 사회적 불의, 경제적 착취, 공허한 종교 수행, 언약 불신실에 대한 예언자들의 정죄는 주전 8세기만큼이나 지금도 긴급하다. 구조적 조건은 변했지만 언약 논리는 변하지 않았다. 공동체가 가난한 자를 착취하고, 정의를 무시하면서 예배를 수행하고, 언약 신실함을 버리면서 군사적·정치적 안정을 추구하는 곳에서 예언의 말씀은 원래의 힘을 지닌다.</p><p>현대 독자의 정체성은 이 공부를 통해 다시 형성되었다. 미래 예언 사냥꾼에서 조명받은 참여자로, 예측 해독자에서 언약으로 형성된 실천자로 이동했다. 조명받은 독자는 새로운 sensus plenior를 제조할 권한은 없지만, 자기 순간 안에서 같은 언약 역학이 작동하는 곳을 식별하고 자신과 공동체를 예언자들이 요구한 동일한 신실함으로 다시 부를 권한과 의무가 있다.</p><p class=\"formation-note\"><strong>Closing Formation Question:</strong> 경제 정의, 종교 수행, 정치적 충성의 영역에서 너의 공동체 안에 있는 어떤 구체적 언약 위반을 주전 8세기 예언자들이 오늘 가장 먼저 이름 붙일 것인가? 그들이 너의 구체적 WHERE를 향해 말한다면 그들의 메신저 공식은 어떻게 들릴 것인가?</p><h3 class=\"section-marker check\">Check your understanding:</h3><ul class=\"practice-list\"><li>“orthodoxy”와 “orthopraxy”의 차이는 무엇인가?</li><li>이 강의가 너를 어떤 독자에서 어떤 독자로 이동시키는지 한 문장으로 설명하라.</li></ul></div>"}, {"id": "moduleindex", "nav_en": "Module Index", "nav_ko": "모듈 인덱스", "en": "<div class=\"hero\"><div class=\"course\">Part 2</div><h1>Module Index · Three Arcs</h1></div><div class=\"card\"><p>The lecture is structured around nine modules organized into three arcs. The first arc (M1–M3) dismantles false assumptions and establishes the prophet&#x27;s identity. The second arc (M4–M7) develops the exegetical and hermeneutical toolkit. The third arc (M8–M9) moves from method to formation.</p><p>Tier 1 — Student Version: This manuscript (with plain-language intros, checklists, worked examples, and Try It boxes) is the student-facing document.</p><p>Tier 2 — Advanced / Professor Version: The Architecture Brief (Part 0) and the deeper rhetorical paragraphs in the Deep Dive sections serve as optional reading for advanced students and as teaching notes for the professor.</p><p>Handong Global University · Understanding the Bible · The Prophets</p><p>MRIA — MetaGenesis Relational Intelligence Architecture · Joshua Kim (김여호수아)</p><div class=\"table-scroll\"><table class=\"data-table\">\n<tr><th>M</th><th>Title</th><th>WHERE · WHO · WHAT Layer</th></tr>\n<tr><td>M1</td><td>Dismantling the Predictive Myth</td><td>WHERE: The historical crisis of 760–460 BC as the primary relational field · WHO: From fortune-teller hunter to attentive covenant listener</td></tr>\n<tr><td>M2</td><td>Covenant Enforcement Mediators</td><td>WHAT: The prophetic vocation as ambassador of an existing covenant, not inventor of new theology · WHERE: The Suzerain-Vassal relational field</td></tr>\n<tr><td>M3</td><td>The Identity of the Prophet: Nābīʾ</td><td>WHO: The prophet as divinely constrained mouthpiece · Passive (receiving) and active (proclaiming) dimensions of prophetic identity</td></tr>\n<tr><td>M4</td><td>The Five Forms of the Oracle</td><td>WHERE: The covenant courtroom (rîb), the funeral lament (woe), the promise · WHAT: Genre as the rule of the language game</td></tr>\n<tr><td>M5</td><td>Grounding Oracles in History</td><td>WHERE: Larger context (the era) and Specific context (the oracle) · WHO: The illumined reader navigating historical distance and telescoping of time</td></tr>\n<tr><td>M6</td><td>The Hermeneutical Spiral</td><td>WHERE: The interpretive field between the ancient horizon and the contemporary horizon · WHAT: Exegesis as mandatory first move</td></tr>\n<tr><td>M7</td><td>Exegesis and Hermeneutics</td><td>WHAT: The two tasks — thinking paragraphs (then/there) and the Basic Rule controlling contemporary application (here/now) · WHO: The author&#x27;s intent as objective control</td></tr>\n<tr><td>M8</td><td>Genre-Specific Principles</td><td>WHERE: Prophetic poetry, occasional address, typological resonance, intertextual grounding · WHAT: Attending to the rules of each literary language game</td></tr>\n<tr><td>M9</td><td>Integration: From Illumined Reading to Orthopraxy</td><td>WHAT: The formation destination — covenant loyalty enacted in specific social, economic, and religious spheres · Closing Socratic question</td></tr>\n</table></div></div>", "ko": "<div class=\"hero\"><div class=\"course\">Part 2</div><h1>모듈 인덱스 · 세 개의 아크</h1></div><div class=\"card\"><p>강의는 세 개의 아크로 구성된 아홉 개의 모듈로 배열된다. 첫 번째 아크(M1–M3)는 잘못된 전제를 해체하고 예언자의 정체성을 세운다. 두 번째 아크(M4–M7)는 주해와 해석학 도구를 개발한다. 세 번째 아크(M8–M9)는 예언 장르의 특수성과 오늘의 orthopraxy로 이동한다.</p><p><strong>Tier 1 — Student Version:</strong> 이 원고는 쉬운 언어의 도입, 체크리스트, worked example, Try It 상자를 포함한 학생용 문서이다.</p><p><strong>Tier 2 — Advanced / Professor Version:</strong> Part 0 Architecture Brief와 Deep Dive의 더 깊은 수사적 문단들은 고급 학생의 선택 읽기와 교수자의 강의 노트로 기능한다.</p><div class=\"table-scroll\"><table><tr><th>M</th><th>Title</th><th>WHERE · WHO · WHAT Layer</th></tr><tr><td>M1</td><td>Dismantling the Predictive Myth</td><td>WHERE: 주전 760–460년의 역사적 위기를 1차 관계 장으로 회복 · WHO: 미래 예언 사냥꾼에서 언약을 듣는 독자로 이동</td></tr><tr><td>M2</td><td>Covenant Enforcement Mediators</td><td>WHAT: 이미 주어진 언약의 사절 · WHERE: 종주권-봉신 관계 장</td></tr><tr><td>M3</td><td>The Identity of the Prophet: Nābīʾ</td><td>WHO: 수용과 선포를 함께 가진 하나님의 입</td></tr><tr><td>M4</td><td>The Five Forms of the Oracle</td><td>WHERE: 언약 법정, 장례 애가, 약속 · WHAT: 의미를 규정하는 장르</td></tr><tr><td>M5</td><td>Grounding Oracles in History</td><td>WHERE: 큰 문맥과 특정 문맥 · WHO: 역사적 거리와 예언 시간의 압축을 항해하는 독자</td></tr><tr><td>M6</td><td>The Hermeneutical Spiral</td><td>WHERE: 고대 지평과 현대 지평 사이의 해석 장 · WHAT: 주해가 첫 움직임</td></tr><tr><td>M7</td><td>Exegesis and Hermeneutics</td><td>WHAT: 주해와 해석학의 두 과제 · WHO: 저자의 의도가 객관적 통제 역할</td></tr><tr><td>M8</td><td>Genre-Specific Principles</td><td>WHERE: 예언 시, 상황적 발화, typological resonance, 상호본문적 근거</td></tr><tr><td>M9</td><td>Integration to Orthopraxy</td><td>WHAT: 언약 충성이 사회·경제·종교적 영역에서 구현되는 형성 목적지</td></tr></table></div></div>"}, {"id": "coretexts", "nav_en": "Core Texts", "nav_ko": "핵심 본문", "en": "<div class=\"hero\"><div class=\"course\">Core Text Practice</div><h1>Six Prophetic Texts · 1 Exegetical + 1 Hermeneutical Question Each</h1><p class=\"subtitle\">Designed for BH Week 13: three texts for Tuesday and three texts for Friday.</p></div><div class=\"grid two\"><div class=\"card text-card\"><span class=\"pill\">Tuesday</span><h3>1. Amos 2:6–8 — Judgment Speech and Economic Exploitation</h3><p><strong>Exegetical Question:</strong> Identify the messenger formula, accusation, and announcement of disaster. What covenant violation is named?</p><textarea placeholder=\"Student exegetical notes\"></textarea><p><strong>Hermeneutical Question:</strong> Where do contemporary communities trade human dignity for economic advantage, and how should the prophetic word confront that practice?</p><textarea placeholder=\"Student hermeneutical reflection\"></textarea></div><div class=\"card text-card\"><span class=\"pill\">Tuesday</span><h3>2. Isaiah 5:8–10 — Woe Oracle and Land Accumulation</h3><p><strong>Exegetical Question:</strong> How does hôy function as funeral-lament language before judgment fully arrives?</p><textarea placeholder=\"Student exegetical notes\"></textarea><p><strong>Hermeneutical Question:</strong> What forms of accumulation today create social isolation, displacement, or covenantal death?</p><textarea placeholder=\"Student hermeneutical reflection\"></textarea></div><div class=\"card text-card\"><span class=\"pill\">Tuesday</span><h3>3. Hosea 5:8–12 — Specific Context and Historical Crisis</h3><p><strong>Exegetical Question:</strong> Reconstruct the historical situation behind this war oracle. Why does the Syro-Ephraimite crisis matter?</p><textarea placeholder=\"Student exegetical notes\"></textarea><p><strong>Hermeneutical Question:</strong> How can a community discern when political fear is replacing covenant loyalty?</p><textarea placeholder=\"Student hermeneutical reflection\"></textarea></div><div class=\"card text-card\"><span class=\"pill\">Friday</span><h3>4. Isaiah 9:1–7 — Telescoping Prophetic Time</h3><p><strong>Exegetical Question:</strong> Which horizon is dominant: immediate relief, royal hope, or eschatological fulfillment? How does the text hold them together?</p><textarea placeholder=\"Student exegetical notes\"></textarea><p><strong>Hermeneutical Question:</strong> How can hope be proclaimed without flattening historical distance or inventing unsupported fulfillment?</p><textarea placeholder=\"Student hermeneutical reflection\"></textarea></div><div class=\"card text-card\"><span class=\"pill\">Friday</span><h3>5. Jeremiah 7:1–15 — Temple Sermon and Empty Religious Performance</h3><p><strong>Exegetical Question:</strong> What specific covenant failures make the temple slogan false security rather than faithful trust?</p><textarea placeholder=\"Student exegetical notes\"></textarea><p><strong>Hermeneutical Question:</strong> Where do religious communities today use worship language to avoid justice, repentance, or repair?</p><textarea placeholder=\"Student hermeneutical reflection\"></textarea></div><div class=\"card text-card\"><span class=\"pill\">Friday</span><h3>6. Micah 6:1–8 — Rîb and Orthopraxy</h3><p><strong>Exegetical Question:</strong> How does the covenant lawsuit form shape God’s accusation and the required response?</p><textarea placeholder=\"Student exegetical notes\"></textarea><p><strong>Hermeneutical Question:</strong> What would doing justice, loving kindness, and walking humbly require in your own WHERE?</p><textarea placeholder=\"Student hermeneutical reflection\"></textarea></div></div>", "ko": "<div class=\"hero\"><div class=\"course\">핵심 본문 실습</div><h1>예언서 핵심 본문 6개 · 각 본문 1 주해 + 1 해석 질문</h1><p class=\"subtitle\">BH 13주차를 위해 설계: 화요일 3본문, 금요일 3본문.</p></div><div class=\"grid two\"><div class=\"card text-card\"><span class=\"pill\">화요일</span><h3>1. Amos 2:6–8 — 심판 연설과 경제적 착취</h3><p><strong>주해 질문:</strong> 메신저 공식, 고발, 재앙 선포를 식별하라. 어떤 언약 위반이 이름 붙여지는가?</p><textarea placeholder=\"학생 주해 메모\"></textarea><p><strong>해석 질문:</strong> 오늘의 공동체는 어디에서 인간 존엄을 경제적 이익과 맞바꾸는가? 예언의 말씀은 그 실천을 어떻게 마주해야 하는가?</p><textarea placeholder=\"학생 해석 성찰\"></textarea></div><div class=\"card text-card\"><span class=\"pill\">화요일</span><h3>2. Isaiah 5:8–10 — 화 신탁과 토지 축적</h3><p><strong>주해 질문:</strong> hôy는 심판이 완전히 오기 전에 장례 애가의 언어로 어떻게 기능하는가?</p><textarea placeholder=\"학생 주해 메모\"></textarea><p><strong>해석 질문:</strong> 오늘 어떤 형태의 축적이 사회적 고립, 밀려남, 언약적 죽음을 만들어 내는가?</p><textarea placeholder=\"학생 해석 성찰\"></textarea></div><div class=\"card text-card\"><span class=\"pill\">화요일</span><h3>3. Hosea 5:8–12 — 특정 문맥과 역사적 위기</h3><p><strong>주해 질문:</strong> 이 전쟁 신탁 뒤의 역사적 상황을 재구성하라. Syro-Ephraimite 위기가 왜 중요한가?</p><textarea placeholder=\"학생 주해 메모\"></textarea><p><strong>해석 질문:</strong> 공동체는 정치적 두려움이 언약 충성을 대체하고 있는 때를 어떻게 분별할 수 있는가?</p><textarea placeholder=\"학생 해석 성찰\"></textarea></div><div class=\"card text-card\"><span class=\"pill\">금요일</span><h3>4. Isaiah 9:1–7 — 예언 시간의 망원적 압축</h3><p><strong>주해 질문:</strong> 즉각적 구원, 왕적 소망, 종말론적 성취 중 어떤 지평이 지배적인가? 본문은 이 지평들을 어떻게 함께 보존하는가?</p><textarea placeholder=\"학생 주해 메모\"></textarea><p><strong>해석 질문:</strong> 역사적 거리를 평면화하거나 근거 없는 성취를 만들어 내지 않으면서 소망을 어떻게 선포할 수 있는가?</p><textarea placeholder=\"학생 해석 성찰\"></textarea></div><div class=\"card text-card\"><span class=\"pill\">금요일</span><h3>5. Jeremiah 7:1–15 — 성전 설교와 공허한 종교 수행</h3><p><strong>주해 질문:</strong> 어떤 구체적 언약 실패가 성전 구호를 신실한 신뢰가 아니라 거짓 안전으로 만드는가?</p><textarea placeholder=\"학생 주해 메모\"></textarea><p><strong>해석 질문:</strong> 오늘 종교 공동체는 어디에서 예배 언어를 정의, 회개, 회복을 피하는 수단으로 사용하는가?</p><textarea placeholder=\"학생 해석 성찰\"></textarea></div><div class=\"card text-card\"><span class=\"pill\">금요일</span><h3>6. Micah 6:1–8 — Rîb와 Orthopraxy</h3><p><strong>주해 질문:</strong> 언약 소송 형식은 하나님의 고발과 요구되는 응답을 어떻게 형성하는가?</p><textarea placeholder=\"학생 주해 메모\"></textarea><p><strong>해석 질문:</strong> 너의 WHERE에서 정의를 행하고 인자를 사랑하며 겸손히 걷는 것은 무엇을 요구하는가?</p><textarea placeholder=\"학생 해석 성찰\"></textarea></div></div>"}, {"id": "glossary", "nav_en": "Glossary", "nav_ko": "용어 사전", "en": "<div class=\"hero\"><div class=\"course\">Consolidated Key Term Lexicon</div><h1>Prophets Glossary</h1><input id=\"glossSearch\" class=\"search\" placeholder=\"Search terms\" oninput=\"filterGlossary()\"></div><div class=\"card\"><div id=\"glossaryList\" class=\"glossary-list\"><div class=\"gloss-item\"><h3>Forth-telling</h3><p><strong>Fee &amp; Stuart, Osborne</strong> · Speaking God&#x27;s word directly to one&#x27;s own contemporaries; the primary function of the prophetic vocation.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Fore-telling</h3><p><strong>Fee &amp; Stuart, Osborne</strong> · Predicting future events; a secondary instrument subordinate to forth-telling, comprising less than 2% of the prophetic corpus.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Covenant Enforcement Mediator</h3><p><strong>Stuart, Osborne</strong> · One who announces the enforcement of God&#x27;s already-established law — blessings for fidelity, curses (the Ten D&#x27;s) for disobedience — rather than inventing new theology.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>The Ten D&#x27;s</h3><p><strong>Stuart</strong> · Ten categories of covenantal curse: death, disease, drought, dearth, danger, destruction, defeat, deportation, destitution, and disgrace.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Oracle</h3><p><strong>Stuart</strong> · A discrete spoken message from God, typically in poetic form, serving as the basic compositional unit of the prophetic books.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Nābīʾ (נָבִיא)</h3><p><strong>Osborne</strong> · The Hebrew term for &quot;prophet,&quot; carrying both a passive side (receiving revelation) and an active side (proclaiming it).</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Judgment Speech</h3><p><strong>Osborne</strong> · The foundational prophetic form: a messenger formula followed by an accusation and an announcement of coming disaster.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Woe Oracle</h3><p><strong>Osborne</strong> · A judgment prophecy opening with hôy (&quot;woe&quot;), drawn from the register of funeral lament to signal impending sorrow.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Rîb (רִיב)</h3><p><strong>Stuart, Osborne</strong> · The covenant lawsuit form: God acts simultaneously as suzerain, plaintiff, and judge, summoning Israel to the divine law court.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Sensus Plenior</h3><p><strong>Stuart, Osborne</strong> · A &quot;fuller meaning&quot; of a text, identified by New Testament writers under inspiration, but not independently available to the modern illumined reader.</p><span class=\"pill\">SCL-2</span></div><div class=\"gloss-item\"><h3>Hermeneutical Spiral</h3><p><strong>Osborne</strong> · An open-ended, iterative movement from the original horizon of the text toward the horizon of the contemporary reader, narrowing progressively toward intended meaning.</p><span class=\"pill\">SCL-2</span></div><div class=\"gloss-item\"><h3>Exegesis</h3><p><strong>Fee &amp; Stuart, Osborne</strong> · The systematic, historically anchored task of determining what the text meant in its original &quot;then and there&quot; context.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Hermeneutics</h3><p><strong>Fee &amp; Stuart</strong> · The subsequent task of discerning what the text means in the contemporary &quot;here and now,&quot; always controlled by the results of exegesis.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Historical Particularity</h3><p><strong>Fee</strong> · The condition that each biblical document is irreducibly shaped by the specific language, culture, and time of its original composition.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Orthopraxy</h3><p><strong>Stuart, Osborne</strong> · Correct living as the telos of prophetic hearing: the covenant call is not merely cognitive assent but embodied, ethical faithfulness.</p><span class=\"pill\">SCL-1</span></div></div></div>", "ko": "<div class=\"hero\"><div class=\"course\">핵심 용어 사전</div><h1>예언서 Glossary</h1><input id=\"glossSearchKo\" class=\"search\" placeholder=\"용어 검색\" oninput=\"filterGlossaryKo()\"></div><div class=\"card\"><div id=\"glossaryListKo\" class=\"glossary-list\"><div class=\"gloss-item\"><h3>Forth-telling</h3><p><strong>Fee &amp; Stuart, Osborne</strong> · 자기 시대의 동시대인에게 하나님의 말씀을 직접 선포하는 것. 예언자 소명의 1차 기능이다.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Fore-telling</h3><p><strong>Fee &amp; Stuart, Osborne</strong> · 미래 사건을 예측하는 것. forth-telling에 종속된 2차 도구이며 예언서 전체의 작은 부분만 차지한다.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Covenant Enforcement Mediator</h3><p><strong>Stuart, Osborne</strong> · 하나님이 이미 세우신 법의 집행, 곧 신실함에는 복을, 불순종에는 저주를 선포하는 사람. 새로운 신학을 발명하지 않는다.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>The Ten D&#x27;s</h3><p><strong>Stuart</strong> · 언약 저주의 열 범주: 죽음, 질병, 가뭄, 결핍, 위험, 파괴, 패배, 추방, 궁핍, 수치.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Oracle</h3><p><strong>Stuart</strong> · 하나님에게서 온 분리된 구두 메시지. 대개 시적 형식이며 예언서의 기본 구성 단위이다.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Nābīʾ (נָבִיא)</h3><p><strong>Osborne</strong> · “예언자”를 뜻하는 히브리어. 계시를 받는 수동적 측면과 그것을 선포하는 능동적 측면을 함께 가진다.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Judgment Speech</h3><p><strong>Osborne</strong> · 가장 기본적인 예언 형식. 메신저 공식, 고발, 재앙 선포로 구성된다.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Woe Oracle</h3><p><strong>Osborne</strong> · hôy, “화 있을진저”로 시작하는 심판 예언. 장례 애가의 어휘에서 나와 임박한 슬픔을 알린다.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Rîb (רִיב)</h3><p><strong>Stuart, Osborne</strong> · 언약 소송 형식. 하나님은 종주, 원고, 재판관으로서 이스라엘을 신적 법정에 소환하신다.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Sensus Plenior</h3><p><strong>Stuart, Osborne</strong> · 신약 저자들이 영감 아래 식별한 “더 충만한 의미.” 현대의 조명받은 독자가 독립적으로 만들어 낼 수 없다.</p><span class=\"pill\">SCL-2</span></div><div class=\"gloss-item\"><h3>Hermeneutical Spiral</h3><p><strong>Osborne</strong> · 본문의 원래 지평에서 현대 독자의 지평으로 반복적으로 이동하며 의도된 의미를 향해 좁혀 가는 열린 해석 운동.</p><span class=\"pill\">SCL-2</span></div><div class=\"gloss-item\"><h3>Exegesis</h3><p><strong>Fee &amp; Stuart, Osborne</strong> · 본문이 원래 “그때 거기”에서 무엇을 의미했는지를 역사적으로 규명하는 체계적 과제.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Hermeneutics</h3><p><strong>Fee &amp; Stuart</strong> · 주해 결과의 통제를 받으며 본문이 현대의 “지금 여기”에서 무엇을 의미하는지 분별하는 후속 과제.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Historical Particularity</h3><p><strong>Fee</strong> · 각 성경 문서가 원래 저작의 구체적 언어, 문화, 시대에 의해 형성되어 있다는 조건.</p><span class=\"pill\">SCL-1</span></div><div class=\"gloss-item\"><h3>Orthopraxy</h3><p><strong>Stuart, Osborne</strong> · 예언적 청취의 목적지로서의 바른 삶. 언약의 부름은 단순한 인지적 동의가 아니라 embodied ethical faithfulness이다.</p><span class=\"pill\">SCL-1</span></div></div></div>"}, {"id": "mcq", "nav_en": "MCQ", "nav_ko": "퀴즈", "en": "<div class=\"hero\"><div class=\"course\">Self Assessment</div><h1>10-Question MCQ</h1><p class=\"subtitle\">These questions check the core method before class.</p></div><div class=\"card\"><div id=\"quizBox\"></div><button onclick=\"gradeQuiz()\">Grade Quiz</button><p id=\"scoreBox\" class=\"score\"></p></div>", "ko": "<div class=\"hero\"><div class=\"course\">자가 점검</div><h1>10문항 선다형 퀴즈</h1><p class=\"subtitle\">수업 전에 핵심 방법을 점검한다.</p></div><div class=\"card\"><div id=\"quizBoxKo\"></div><button onclick=\"gradeQuizKo()\">채점하기</button><p id=\"scoreBoxKo\" class=\"score\"></p></div>"}, {"id": "spiral", "nav_en": "Spiral Practice", "nav_ko": "나선 실습", "en": "<div class=\"hero\"><div class=\"course\">Hermeneutical Spiral Practice</div><h1>From Exegesis to Significance</h1></div><div class=\"grid three\"><div class=\"card\"><h3>1. Exegesis</h3><p>What did this oracle mean in its original historical and literary setting?</p><textarea placeholder=\"Then and there\"></textarea></div><div class=\"card\"><h3>2. Devotion</h3><p>How does the text address your own life before God without bypassing its original meaning?</p><textarea placeholder=\"First-person appropriation\"></textarea></div><div class=\"card\"><h3>3. Proclamation</h3><p>How could this word be shared with a community today while respecting historical particularity?</p><textarea placeholder=\"Second-person proclamation\"></textarea></div></div><div class=\"card formation-note\"><h3>Basic Rule</h3><p>A text cannot mean what it could never have meant for its original readers. Where our situation is truly similar, God’s word to them still speaks with force to us.</p></div>", "ko": "<div class=\"hero\"><div class=\"course\">해석학적 나선 실습</div><h1>주해에서 오늘의 의미로</h1></div><div class=\"grid three\"><div class=\"card\"><h3>1. 주해</h3><p>이 신탁은 원래의 역사적·문학적 상황에서 무엇을 의미했는가?</p><textarea placeholder=\"그때 거기\"></textarea></div><div class=\"card\"><h3>2. 묵상</h3><p>원래 의미를 건너뛰지 않으면서, 이 본문은 하나님 앞의 나의 삶을 어떻게 다루는가?</p><textarea placeholder=\"1인칭 수용\"></textarea></div><div class=\"card\"><h3>3. 선포</h3><p>역사적 특수성을 존중하면서 이 말씀을 오늘 공동체에 어떻게 나눌 수 있는가?</p><textarea placeholder=\"2인칭 선포\"></textarea></div></div><div class=\"card formation-note\"><h3>기본 규칙</h3><p>본문은 원래 독자들에게 결코 의미할 수 없었던 것을 오늘 의미할 수 없다. 우리의 상황이 참으로 유사할 때, 그들에게 주어진 하나님의 말씀은 우리에게도 힘 있게 말한다.</p></div>"}, {"id": "synthesis", "nav_en": "Final Synthesis", "nav_ko": "최종 종합", "en": "<div class=\"hero\"><div class=\"course\">Final Synthesis</div><h1>Threshold Export for Active Learning</h1><p class=\"subtitle\">Carry these four items into the in-class discussion.</p></div><div class=\"grid two\"><div class=\"card\"><h3>One insight</h3><textarea id=\"rInsight\" placeholder=\"What did you understand more clearly?\"></textarea></div><div class=\"card\"><h3>One tension</h3><textarea id=\"rTension\" placeholder=\"What still troubles or challenges you?\"></textarea></div><div class=\"card\"><h3>One unresolved question</h3><textarea id=\"rQuestion\" placeholder=\"What do you need to ask in class?\"></textarea></div><div class=\"card\"><h3>One movement statement</h3><textarea id=\"rMove\" placeholder=\"From what kind of reader to what kind of reader are you moving?\"></textarea></div></div><div class=\"card\"><button onclick=\"exportReflection()\">Export Reflection JSON</button><button onclick=\"window.print()\">Print / Save PDF</button><textarea id=\"exportOut\" placeholder=\"Export appears here\"></textarea></div>", "ko": "<div class=\"hero\"><div class=\"course\">최종 종합</div><h1>Active Learning을 위한 Threshold Export</h1><p class=\"subtitle\">다음 네 가지를 수업 토론으로 가져간다.</p></div><div class=\"grid two\"><div class=\"card\"><h3>한 가지 통찰</h3><textarea id=\"rInsightKo\" placeholder=\"무엇을 더 분명히 이해했는가?\"></textarea></div><div class=\"card\"><h3>한 가지 긴장</h3><textarea id=\"rTensionKo\" placeholder=\"무엇이 여전히 도전이 되거나 불편한가?\"></textarea></div><div class=\"card\"><h3>한 가지 남은 질문</h3><textarea id=\"rQuestionKo\" placeholder=\"수업에서 무엇을 질문해야 하는가?\"></textarea></div><div class=\"card\"><h3>한 가지 이동 문장</h3><textarea id=\"rMoveKo\" placeholder=\"나는 어떤 독자에서 어떤 독자로 이동하고 있는가?\"></textarea></div></div><div class=\"card\"><button onclick=\"exportReflectionKo()\">성찰 JSON 내보내기</button><button onclick=\"window.print()\">인쇄 / PDF 저장</button><textarea id=\"exportOutKo\" placeholder=\"내보내기 내용이 여기에 표시됩니다\"></textarea></div>"}];
const MCQS = [["The primary function of Old Testament prophets is best described as:", "구약 예언자의 1차 기능은 무엇으로 가장 잘 설명되는가?", ["predicting 21st-century events", "forth-telling God’s word to their contemporaries", "inventing new theology", "replacing Torah"], ["21세기 사건 예측", "동시대인에게 하나님의 말씀을 선포하기", "새 신학 만들기", "토라 대체"], 1], ["According to Stuart, prophets are Covenant Enforcement Mediators because they:", "Stuart에 따르면 예언자가 언약 집행 중재자인 이유는 무엇인가?", ["enforce already-established covenant stipulations", "create private spiritual meanings", "ignore Israel’s history", "write wisdom proverbs"], ["이미 세워진 언약 규정을 집행하기 때문이다", "사적 영적 의미를 만들기 때문이다", "이스라엘 역사를 무시하기 때문이다", "지혜 잠언을 쓰기 때문이다"], 0], ["The Ten D’s name:", "Ten D’s는 무엇을 가리키는가?", ["prophetic genres", "covenantal curses", "apostolic virtues", "temple rituals"], ["예언 장르", "언약 저주", "사도적 덕목", "성전 제의"], 1], ["Nābīʾ includes which two movements?", "Nābīʾ는 어떤 두 움직임을 포함하는가?", ["reading and writing", "receiving and proclaiming", "judging and escaping", "singing and mourning"], ["읽기와 쓰기", "수용과 선포", "판단과 도피", "노래와 애도"], 1], ["A rîb is:", "rîb는 무엇인가?", ["a covenant lawsuit", "a wisdom poem", "a royal genealogy", "a parable"], ["언약 소송", "지혜시", "왕실 족보", "비유"], 0], ["A woe oracle uses hôy because it draws from:", "화 신탁이 hôy를 사용하는 이유는 그것이 어디에서 왔기 때문인가?", ["wedding celebration", "funeral lament", "market speech", "royal census"], ["혼인 잔치", "장례 애가", "시장 연설", "왕실 인구 조사"], 1], ["The larger context of an oracle refers to:", "신탁의 larger context는 무엇을 가리키는가?", ["the whole historical era", "the font size of the scroll", "the modern reader’s feelings", "only the next verse"], ["전체 역사 시대", "두루마리 글자 크기", "현대 독자의 감정", "오직 다음 절"], 0], ["Sensus plenior should be generated by modern readers independently.", "Sensus plenior는 현대 독자가 독립적으로 만들어 낼 수 있다.", ["True", "False"], ["참", "거짓"], 1], ["Fee’s basic rule says a text cannot mean:", "Fee의 기본 규칙에 따르면 본문은 무엇을 의미할 수 없는가?", ["what it could never have meant to original readers", "anything practical", "anything theological", "anything poetic"], ["원래 독자들에게 결코 의미할 수 없었던 것", "실천적인 것", "신학적인 것", "시적인 것"], 0], ["Orthopraxy means:", "Orthopraxy는 무엇을 뜻하는가?", ["correct living in response to covenant truth", "memorizing all prophetic dates", "predicting the end times", "ignoring justice"], ["언약 진리에 응답하는 바른 삶", "모든 예언 날짜 암기", "종말 예측", "정의 무시"], 0]];

}

function grade(){let correct=0; MCQS.forEach((q,i)=>{const ans=q[4]; const picked=document.querySelector(`input[name="q${i}"]:checked`); document.querySelectorAll(`input[name="q${i}"]`).forEach(inp=>{const lab=inp.closest('label'); lab.classList.remove('correct','wrong'); if(Number(inp.value)===ans) lab.classList.add('correct'); if(picked && inp===picked && Number(inp.value)!==ans) lab.classList.add('wrong');}); if(picked && Number(picked.value)===ans) correct++;}); const id=state.lang==='en'?'scoreBox':'scoreBoxKo'; const box=document.getElementById(id); if(box) box.textContent=label('Score: ','점수: ')+correct+'/'+MCQS.length;}
function filterGlossary(){const q=document.getElementById('glossSearch').value.toLowerCase(); document.querySelectorAll('#glossaryList .gloss-item').forEach(el=>el.style.display=el.textContent.toLowerCase().includes(q)?'block':'none');}
function filterGlossaryKo(){const q=document.getElementById('glossSearchKo').value.toLowerCase(); document.querySelectorAll('#glossaryListKo .gloss-item').forEach(el=>el.style.display=el.textContent.toLowerCase().includes(q)?'block':'none');}

function exportReflectionKo(){const out={course:'BH Week 13 Prophets',language:'ko',insight:val('rInsightKo'),tension:val('rTensionKo'),question:val('rQuestionKo'),movement:val('rMoveKo'),timestamp:new Date().toISOString()}; document.getElementById('exportOutKo').value=JSON.stringify(out,null,2);}
